apiVersion: v1
data:
  index.html: "<!DOCTYPE html>\n<html lang=\"en\">\n<head>\n    <meta charset=\"UTF-8\"\
    >\n    <meta name=\"viewport\" content=\"width=device-width, initial-scale=1.0\"\
    >\n    <title>Sunbird AI Assistant | DCIM Intelligence Platform</title>\n    <link\
    \ rel=\"preconnect\" href=\"https://fonts.googleapis.com\">\n    <link rel=\"\
    preconnect\" href=\"https://fonts.gstatic.com\" crossorigin>\n    <link href=\"\
    https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap\"\
    \ rel=\"stylesheet\">\n    <style>\n        :root {\n            /* Sunbird Brand\
    \ Colors */\n            --sunbird-orange: #F7941D;\n            --sunbird-orange-light:\
    \ #FFAD4A;\n            --sunbird-orange-dark: #E07D00;\n            --sunbird-amber:\
    \ #FFC107;\n\n            /* IISL Corporate Colors */\n            --iisl-blue:\
    \ #1E3A5F;\n            --iisl-blue-light: #2C5282;\n            --iisl-blue-dark:\
    \ #0F2439;\n\n            /* Neutral Palette */\n            --bg-primary: #0A0E14;\n\
    \            --bg-secondary: #111821;\n            --bg-tertiary: #1A2332;\n \
    \           --bg-card: #151D2B;\n            --bg-hover: #1F2A3C;\n\n        \
    \    --text-primary: #F0F4F8;\n            --text-secondary: #A0AEC0;\n      \
    \      --text-muted: #718096;\n\n            /* Accents */\n            --success:\
    \ #48BB78;\n            --error: #FC8181;\n            --blue: #63B3ED;\n    \
    \        --purple: #B794F4;\n            --border: rgba(255, 255, 255, 0.08);\n\
    \            --border-highlight: rgba(247, 148, 29, 0.3);\n\n            /* Shadows\
    \ */\n            --shadow-sm: 0 2px 8px rgba(0, 0, 0, 0.3);\n            --shadow-md:\
    \ 0 4px 20px rgba(0, 0, 0, 0.4);\n            --shadow-glow: 0 0 30px rgba(247,\
    \ 148, 29, 0.12);\n        }\n\n        * { margin: 0; padding: 0; box-sizing:\
    \ border-box; }\n\n        body {\n            font-family: 'Plus Jakarta Sans',\
    \ -apple-system, BlinkMacSystemFont, sans-serif;\n            background: var(--bg-primary);\n\
    \            color: var(--text-primary);\n            height: 100vh;\n       \
    \     display: flex;\n            flex-direction: column;\n            overflow:\
    \ hidden;\n            line-height: 1.6;\n        }\n\n        /* \u2500\u2500\
    \u2500 Animated Background \u2500\u2500\u2500 */\n        .bg-pattern {\n    \
    \        position: fixed; top: 0; left: 0; right: 0; bottom: 0;\n            pointer-events:\
    \ none; z-index: 0; overflow: hidden;\n        }\n        .bg-pattern::before\
    \ {\n            content: ''; position: absolute; top: -50%; left: -50%; width:\
    \ 200%; height: 200%;\n            background:\n                radial-gradient(ellipse\
    \ at 20% 20%, rgba(247,148,29,0.06) 0%, transparent 50%),\n                radial-gradient(ellipse\
    \ at 80% 80%, rgba(30,58,95,0.10) 0%, transparent 50%);\n            animation:\
    \ bgShift 30s ease-in-out infinite;\n        }\n        @keyframes bgShift {\n\
    \            0%, 100% { transform: translate(0,0) rotate(0deg); }\n          \
    \  33% { transform: translate(-3%,3%) rotate(1deg); }\n            66% { transform:\
    \ translate(3%,-3%) rotate(-1deg); }\n        }\n\n        /* \u2500\u2500\u2500\
    \ Header \u2500\u2500\u2500 */\n        .header {\n            position: relative;\
    \ z-index: 100;\n            display: flex;\n            align-items: center;\n\
    \            justify-content: space-between;\n            padding: 0 24px;\n \
    \           height: 56px;\n            background: linear-gradient(180deg, var(--bg-secondary)\
    \ 0%, rgba(17,24,33,0.95) 100%);\n            border-bottom: 1px solid var(--border);\n\
    \            flex-shrink: 0;\n        }\n\n        .header-left {\n          \
    \  display: flex; align-items: center; gap: 14px;\n        }\n\n        .logo-icon\
    \ {\n            width: 38px; height: 38px;\n            background: linear-gradient(135deg,\
    \ var(--sunbird-orange) 0%, var(--sunbird-orange-dark) 100%);\n            border-radius:\
    \ 10px;\n            display: flex; align-items: center; justify-content: center;\n\
    \            box-shadow: var(--shadow-glow);\n        }\n        .logo-icon svg\
    \ { width: 22px; height: 22px; fill: white; }\n\n        .logo-text { display:\
    \ flex; flex-direction: column; }\n        .logo-title {\n            font-size:\
    \ 1.05rem; font-weight: 700; color: var(--text-primary); letter-spacing: -0.02em;\n\
    \        }\n        .logo-subtitle {\n            font-size: 0.65rem; color: var(--sunbird-orange);\
    \ font-weight: 500;\n            text-transform: uppercase; letter-spacing: 0.1em;\n\
    \        }\n\n        .header-right {\n            display: flex; align-items:\
    \ center; gap: 16px;\n        }\n\n        .company-badge {\n            display:\
    \ flex; align-items: center; gap: 10px;\n            padding: 6px 14px;\n    \
    \        background: var(--bg-tertiary);\n            border-radius: 8px;\n  \
    \          border: 1px solid var(--border);\n        }\n        .company-badge\
    \ svg { width: 20px; height: 20px; flex-shrink: 0; }\n        .company-info {\
    \ display: flex; flex-direction: column; }\n        .company-name {\n        \
    \    font-size: 0.6rem; color: var(--text-muted);\n            text-transform:\
    \ uppercase; letter-spacing: 0.05em;\n        }\n        .company-full { font-size:\
    \ 0.75rem; color: var(--text-secondary); font-weight: 500; }\n\n        .status-pill\
    \ {\n            display: flex; align-items: center; gap: 6px;\n            padding:\
    \ 5px 12px;\n            background: var(--bg-tertiary);\n            border-radius:\
    \ 20px;\n            font-size: 0.68rem;\n            color: var(--text-muted);\n\
    \            border: 1px solid var(--border);\n        }\n        .status-dot\
    \ {\n            width: 6px; height: 6px; border-radius: 50%; background: var(--success);\n\
    \        }\n        .status-dot.offline { background: var(--error); }\n\n    \
    \    /* \u2500\u2500\u2500 Main Layout \u2014 Split Pane \u2500\u2500\u2500 */\n\
    \        .main-layout {\n            position: relative; z-index: 10;\n      \
    \      flex: 1; display: flex; overflow: hidden;\n        }\n\n        /* \u2500\
    \u2500\u2500 Left Pane: Chat \u2500\u2500\u2500 */\n        .chat-pane {\n   \
    \         width: 440px; min-width: 340px;\n            display: flex; flex-direction:\
    \ column;\n            background: var(--bg-secondary);\n            border-right:\
    \ 1px solid var(--border);\n            flex-shrink: 0;\n        }\n\n       \
    \ .pane-header {\n            padding: 12px 18px;\n            border-bottom:\
    \ 1px solid var(--border);\n            display: flex; align-items: center; justify-content:\
    \ space-between;\n        }\n        .pane-header-title {\n            font-size:\
    \ 0.75rem; font-weight: 600; color: var(--text-muted);\n            text-transform:\
    \ uppercase; letter-spacing: 0.06em;\n        }\n        .pane-header-btn {\n\
    \            background: none; border: 1px solid var(--border); border-radius:\
    \ 6px;\n            color: var(--text-muted); font-size: 0.68rem; padding: 4px\
    \ 10px;\n            cursor: pointer; font-family: inherit;\n        }\n     \
    \   .pane-header-btn:hover { border-color: var(--border-highlight); color: var(--text-secondary);\
    \ }\n\n        /* Messages */\n        .messages {\n            flex: 1; overflow-y:\
    \ auto; padding: 16px;\n            display: flex; flex-direction: column; gap:\
    \ 14px;\n        }\n        .messages::-webkit-scrollbar { width: 4px; }\n   \
    \     .messages::-webkit-scrollbar-track { background: transparent; }\n      \
    \  .messages::-webkit-scrollbar-thumb { background: var(--bg-tertiary); border-radius:\
    \ 2px; }\n\n        .message { display: flex; gap: 10px; animation: msgIn 0.25s\
    \ ease-out; }\n        @keyframes msgIn {\n            from { opacity: 0; transform:\
    \ translateY(8px); }\n            to { opacity: 1; transform: translateY(0); }\n\
    \        }\n        .message.user { flex-direction: row-reverse; }\n\n       \
    \ .avatar {\n            width: 32px; height: 32px; border-radius: 10px;\n   \
    \         display: flex; align-items: center; justify-content: center;\n     \
    \       font-size: 0.65rem; font-weight: 600; flex-shrink: 0;\n        }\n   \
    \     .message.user .avatar { background: var(--iisl-blue); color: white; }\n\
    \        .message.assistant .avatar {\n            background: linear-gradient(135deg,\
    \ var(--sunbird-orange), var(--sunbird-orange-dark)); color: white;\n        }\n\
    \n        .msg-body { max-width: 85%; display: flex; flex-direction: column; gap:\
    \ 4px; }\n\n        .msg-text {\n            padding: 10px 14px; border-radius:\
    \ 14px;\n            font-size: 0.85rem; line-height: 1.6;\n        }\n      \
    \  .message.user .msg-text {\n            background: linear-gradient(135deg,\
    \ var(--iisl-blue), var(--iisl-blue-dark));\n            color: white; border-bottom-right-radius:\
    \ 4px;\n        }\n        .message.assistant .msg-text {\n            background:\
    \ var(--bg-tertiary); color: var(--text-primary);\n            border-bottom-left-radius:\
    \ 4px; border: 1px solid var(--border);\n        }\n        .msg-text strong {\
    \ color: var(--sunbird-orange-light); }\n        .msg-text code {\n          \
    \  font-family: 'JetBrains Mono', monospace;\n            background: rgba(0,0,0,0.3);\
    \ padding: 1px 5px; border-radius: 4px; font-size: 0.8em;\n        }\n       \
    \ .msg-text pre {\n            background: rgba(0,0,0,0.4); padding: 10px; border-radius:\
    \ 8px;\n            overflow-x: auto; margin: 6px 0;\n        }\n        .msg-text\
    \ pre code { background: none; padding: 0; }\n        .msg-text a { color: var(--blue);\
    \ text-decoration: none; }\n        .msg-text a:hover { text-decoration: underline;\
    \ }\n        .msg-text ul, .msg-text ol { margin: 6px 0 0 18px; }\n        .msg-text\
    \ li { margin-bottom: 3px; }\n\n        /* View Data button on messages */\n \
    \       .view-data-btn {\n            align-self: flex-start;\n            display:\
    \ none; align-items: center; gap: 5px;\n            background: none; border:\
    \ 1px solid var(--border); border-radius: 6px;\n            padding: 3px 10px;\
    \ font-size: 0.68rem;\n            color: var(--sunbird-orange-light); cursor:\
    \ pointer; font-family: inherit; margin-top: 2px;\n        }\n        .view-data-btn:hover\
    \ { background: rgba(247,148,29,0.08); border-color: var(--border-highlight);\
    \ }\n        .view-data-btn.has-data { display: inline-flex; }\n        .view-data-btn\
    \ svg { width: 11px; height: 11px; stroke: currentColor; fill: none; }\n\n   \
    \     /* Typing */\n        .typing { display: flex; gap: 10px; }\n        .typing-dots\
    \ {\n            display: flex; gap: 4px; padding: 10px 14px;\n            background:\
    \ var(--bg-tertiary); border-radius: 14px; border: 1px solid var(--border); align-items:\
    \ center;\n        }\n        .typing-dots span {\n            width: 6px; height:\
    \ 6px; background: var(--sunbird-orange);\n            border-radius: 50%; animation:\
    \ tbounce 1.4s infinite ease-in-out;\n        }\n        .typing-dots span:nth-child(2)\
    \ { animation-delay: 0.2s; }\n        .typing-dots span:nth-child(3) { animation-delay:\
    \ 0.4s; }\n        @keyframes tbounce {\n            0%, 80%, 100% { transform:\
    \ translateY(0); opacity: 0.4; }\n            40% { transform: translateY(-5px);\
    \ opacity: 1; }\n        }\n\n        /* Input Area */\n        .input-area {\n\
    \            padding: 14px 16px; border-top: 1px solid var(--border); background:\
    \ var(--bg-card);\n        }\n        .input-row { display: flex; gap: 8px; align-items:\
    \ flex-end; }\n        .input-row textarea {\n            flex: 1; min-height:\
    \ 44px; max-height: 120px;\n            padding: 10px 14px; background: var(--bg-secondary);\n\
    \            border: 1px solid var(--border); border-radius: 12px;\n         \
    \   color: var(--text-primary); font-family: inherit;\n            font-size:\
    \ 0.85rem; resize: none; line-height: 1.5;\n        }\n        .input-row textarea:focus\
    \ {\n            outline: none; border-color: var(--sunbird-orange);\n       \
    \     box-shadow: 0 0 0 3px rgba(247,148,29,0.1);\n        }\n        .input-row\
    \ textarea::placeholder { color: var(--text-muted); }\n\n        .send-btn {\n\
    \            width: 44px; height: 44px;\n            background: linear-gradient(135deg,\
    \ var(--sunbird-orange), var(--sunbird-orange-dark));\n            border: none;\
    \ border-radius: 12px; cursor: pointer;\n            display: flex; align-items:\
    \ center; justify-content: center;\n            transition: transform 0.15s, box-shadow\
    \ 0.15s;\n            box-shadow: var(--shadow-sm);\n        }\n        .send-btn:hover\
    \ { transform: translateY(-1px); box-shadow: var(--shadow-md), var(--shadow-glow);\
    \ }\n        .send-btn:active { transform: translateY(0); }\n        .send-btn:disabled\
    \ { opacity: 0.5; cursor: not-allowed; transform: none; }\n        .send-btn svg\
    \ { width: 20px; height: 20px; fill: white; }\n\n        /* Suggestions */\n \
    \       .suggestions { display: flex; gap: 6px; margin-top: 10px; flex-wrap: wrap;\
    \ }\n        .suggestion {\n            padding: 6px 12px; background: var(--bg-tertiary);\n\
    \            border: 1px solid var(--border); border-radius: 20px;\n         \
    \   color: var(--text-secondary); font-size: 0.72rem; cursor: pointer; font-family:\
    \ inherit;\n            transition: all 0.2s;\n        }\n        .suggestion:hover\
    \ { background: var(--bg-hover); border-color: var(--border-highlight); color:\
    \ var(--sunbird-orange-light); }\n\n        /* \u2500\u2500\u2500 Resize Handle\
    \ \u2500\u2500\u2500 */\n        .resize-handle {\n            width: 4px; cursor:\
    \ col-resize; background: transparent;\n            transition: background 0.2s;\
    \ flex-shrink: 0; z-index: 50;\n        }\n        .resize-handle:hover, .resize-handle.active\
    \ { background: var(--sunbird-orange); }\n\n        /* \u2500\u2500\u2500 Right\
    \ Pane: Data Viewer \u2500\u2500\u2500 */\n        .data-pane {\n            flex:\
    \ 1; display: flex; flex-direction: column;\n            background: var(--bg-primary);\
    \ min-width: 300px;\n        }\n\n        .data-header {\n            padding:\
    \ 12px 20px; border-bottom: 1px solid var(--border);\n            display: flex;\
    \ align-items: center; justify-content: space-between;\n            background:\
    \ var(--bg-secondary);\n        }\n        .data-header-left { display: flex;\
    \ align-items: center; gap: 10px; }\n        .data-tool-badge {\n            display:\
    \ none; padding: 3px 8px;\n            background: rgba(247,148,29,0.10); border:\
    \ 1px solid rgba(247,148,29,0.25);\n            border-radius: 6px; font-size:\
    \ 0.65rem; color: var(--sunbird-orange-light);\n            font-family: 'JetBrains\
    \ Mono', monospace;\n        }\n        .data-tool-badge.visible { display: inline-block;\
    \ }\n\n        .data-tabs { display: flex; gap: 2px; }\n        .data-tab {\n\
    \            padding: 5px 12px; background: none; border: 1px solid transparent;\n\
    \            border-radius: 6px; color: var(--text-muted); font-size: 0.72rem;\n\
    \            cursor: pointer; font-family: inherit; font-weight: 500;\n      \
    \  }\n        .data-tab.active { background: var(--bg-tertiary); border-color:\
    \ var(--border); color: var(--text-primary); }\n        .data-tab:hover:not(.active)\
    \ { color: var(--text-secondary); }\n\n        /* Data Stats */\n        .data-stats\
    \ {\n            display: none; gap: 18px; padding: 10px 20px;\n            background:\
    \ var(--bg-secondary); border-bottom: 1px solid var(--border);\n            font-size:\
    \ 0.7rem;\n        }\n        .data-stat { display: flex; align-items: center;\
    \ gap: 6px; color: var(--text-muted); }\n        .data-stat-value {\n        \
    \    color: var(--text-primary); font-weight: 600;\n            font-family: 'JetBrains\
    \ Mono', monospace;\n        }\n\n        /* Data Content */\n        .data-content\
    \ { flex: 1; overflow: auto; }\n        .data-content::-webkit-scrollbar { width:\
    \ 6px; height: 6px; }\n        .data-content::-webkit-scrollbar-track { background:\
    \ transparent; }\n        .data-content::-webkit-scrollbar-thumb { background:\
    \ var(--bg-tertiary); border-radius: 3px; }\n\n        /* Empty State */\n   \
    \     .data-empty {\n            display: flex; flex-direction: column; align-items:\
    \ center; justify-content: center;\n            height: 100%; gap: 14px; color:\
    \ var(--text-muted);\n        }\n        .data-empty-icon {\n            width:\
    \ 64px; height: 64px; background: var(--bg-secondary);\n            border-radius:\
    \ 16px; display: flex; align-items: center; justify-content: center;\n       \
    \     border: 1px solid var(--border);\n        }\n        .data-empty-icon svg\
    \ { width: 28px; height: 28px; stroke: var(--text-muted); fill: none; }\n    \
    \    .data-empty h3 { font-size: 0.95rem; color: var(--text-secondary); font-weight:\
    \ 600; }\n        .data-empty p { font-size: 0.8rem; text-align: center; max-width:\
    \ 300px; line-height: 1.5; }\n\n        /* Table */\n        .data-table-wrapper\
    \ { padding: 0; overflow: auto; }\n        .data-table { width: 100%; border-collapse:\
    \ collapse; font-size: 0.8rem; }\n        .data-table thead { position: sticky;\
    \ top: 0; z-index: 6; }\n        .data-table th {\n            text-align: left;\
    \ padding: 8px 14px; background: var(--iisl-blue-dark);\n            color: var(--text-secondary);\
    \ font-weight: 600; font-size: 0.7rem;\n            text-transform: uppercase;\
    \ letter-spacing: 0.04em;\n            border-bottom: 2px solid var(--sunbird-orange-dark);\n\
    \        }\n        .data-table th.row-num-header {\n            width: 42px;\
    \ min-width: 42px; text-align: center; color: var(--text-muted);\n        }\n\
    \        /* Column filter row */\n        .data-table .filter-row th {\n     \
    \       padding: 4px 6px; background: var(--bg-tertiary);\n            border-bottom:\
    \ 1px solid var(--border);\n        }\n        .data-table .filter-row input {\n\
    \            width: 100%; padding: 4px 8px; font-size: 0.72rem;\n            background:\
    \ var(--bg-primary); color: var(--text-primary);\n            border: 1px solid\
    \ var(--border); border-radius: 4px;\n            font-family: 'Plus Jakarta Sans',\
    \ sans-serif;\n            outline: none; transition: border-color 0.2s;\n   \
    \     }\n        .data-table .filter-row input::placeholder { color: var(--text-muted);\
    \ opacity: 0.6; }\n        .data-table .filter-row input:focus { border-color:\
    \ var(--sunbird-orange); }\n        .data-table td {\n            padding: 8px\
    \ 14px; color: var(--text-primary);\n            border-bottom: 1px solid rgba(255,255,255,0.04);\n\
    \            max-width: 280px; overflow: hidden; text-overflow: ellipsis; white-space:\
    \ nowrap;\n        }\n        /* Row number column */\n        .data-table td.row-num\
    \ {\n            width: 42px; min-width: 42px; text-align: center;\n         \
    \   color: var(--text-muted); font-size: 0.7rem;\n            font-family: 'JetBrains\
    \ Mono', monospace;\n            user-select: none; opacity: 0.5;\n        }\n\
    \        /* Alternating row stripes */\n        .data-table tbody tr:nth-child(odd)\
    \ td { background: var(--bg-secondary); }\n        .data-table tbody tr:nth-child(even)\
    \ td { background: var(--bg-tertiary); }\n        .data-table tbody tr:hover td\
    \ { background: var(--bg-hover); }\n        .data-table tbody tr.filtered-out\
    \ { display: none; }\n        .data-table td.number { font-family: 'JetBrains\
    \ Mono', monospace; color: var(--blue); }\n\n        /* JSON */\n        .data-json-wrapper\
    \ { padding: 16px; display: none; }\n        .data-json-wrapper pre {\n      \
    \      background: var(--bg-secondary); border: 1px solid var(--border);\n   \
    \         border-radius: 10px; padding: 16px;\n            font-family: 'JetBrains\
    \ Mono', monospace; font-size: 0.75rem;\n            color: var(--text-primary);\
    \ overflow: auto; line-height: 1.6;\n            white-space: pre-wrap; word-break:\
    \ break-word;\n        }\n        .json-key { color: var(--purple); }\n      \
    \  .json-string { color: var(--success); }\n        .json-number { color: var(--blue);\
    \ }\n        .json-bool { color: var(--sunbird-orange); }\n        .json-null\
    \ { color: var(--text-muted); }\n\n        /* Footer */\n        .footer {\n \
    \           position: relative; z-index: 10;\n            text-align: center;\
    \ padding: 6px 20px;\n            border-top: 1px solid var(--border); background:\
    \ var(--bg-secondary);\n            font-size: 0.68rem; color: var(--text-muted);\n\
    \            display: flex; justify-content: center; align-items: center; gap:\
    \ 16px;\n            flex-shrink: 0;\n        }\n        .footer a { color: var(--text-secondary);\
    \ text-decoration: none; }\n        .footer a:hover { color: var(--sunbird-orange);\
    \ }\n\n        /* Responsive */\n        @media (max-width: 768px) {\n       \
    \     .main-layout { flex-direction: column; }\n            .chat-pane { width:\
    \ 100% !important; min-width: 0; border-right: none; border-bottom: 1px solid\
    \ var(--border); max-height: 55vh; }\n            .resize-handle { display: none;\
    \ }\n            .data-pane { min-height: 200px; }\n            .company-badge\
    \ { display: none; }\n        }\n    </style>\n</head>\n<body>\n    <div class=\"\
    bg-pattern\"></div>\n\n    <!-- Header -->\n    <header class=\"header\">\n  \
    \      <div class=\"header-left\">\n            <div class=\"logo-icon\">\n  \
    \              <svg viewBox=\"0 0 24 24\"><path d=\"M12 2C6.48 2 2 6.48 2 12s4.48\
    \ 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19\
    \ 8l-9 9z\"/></svg>\n            </div>\n            <div class=\"logo-text\"\
    >\n                <span class=\"logo-title\">Sunbird AI Assistant</span>\n  \
    \              <span class=\"logo-subtitle\">DCIM Intelligence Platform</span>\n\
    \            </div>\n        </div>\n        <div class=\"header-right\">\n  \
    \          <div class=\"status-pill\">\n                <span class=\"status-dot\"\
    \ id=\"statusDot\"></span>\n                <span id=\"statusText\">Connected</span>\n\
    \            </div>\n            <div class=\"company-badge\">\n             \
    \   <svg viewBox=\"0 0 24 24\" fill=\"none\">\n                    <rect x=\"\
    3\" y=\"3\" width=\"18\" height=\"18\" rx=\"3\" stroke=\"#F7941D\" stroke-width=\"\
    2\"/>\n                    <path d=\"M8 12h8M12 8v8\" stroke=\"#F7941D\" stroke-width=\"\
    2\" stroke-linecap=\"round\"/>\n                </svg>\n                <div class=\"\
    company-info\">\n                    <span class=\"company-name\">Powered by</span>\n\
    \                    <span class=\"company-full\">International Integrated Solutions</span>\n\
    \                </div>\n            </div>\n        </div>\n    </header>\n\n\
