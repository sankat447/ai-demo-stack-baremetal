apiVersion: v1
data:
  default.conf: "server {\n    listen 8080;\n    server_name _;\n    root /usr/share/nginx/html;\n\
    \    index index.html;\n\n    # Increase buffer sizes for large base64 payloads\n\
    \    client_max_body_size     20m;\n    client_body_buffer_size  20m;\n    proxy_buffer_size\
    \        128k;\n    proxy_buffers            8 128k;\n    proxy_busy_buffers_size\
    \  256k;\n\n    location / {\n        try_files $uri $uri/ /index.html;\n    }\n\
    \n    location /api/rack {\n        proxy_pass https://workflows.apps.ocp419.crucible.iisl.com/webhook/rack-to-dctrack;\n\
    \        proxy_http_version     1.1;\n        proxy_set_header Host  workflows.apps.ocp419.crucible.iisl.com;\n\
    \        proxy_set_header Content-Type application/json;\n        proxy_ssl_verify\
    \       off;\n        proxy_ssl_server_name  on;\n        proxy_connect_timeout\
    \  30s;\n        proxy_send_timeout     180s;\n        proxy_read_timeout    \
    \ 180s;\n        proxy_request_buffering on;\n        proxy_buffer_size      128k;\n\
    \        proxy_buffers          8 128k;\n        proxy_busy_buffers_size 256k;\n\
    \        client_max_body_size   20m;\n        add_header Access-Control-Allow-Origin\
    \  \"*\" always;\n        add_header Access-Control-Allow-Methods \"GET, POST,\
    \ OPTIONS\" always;\n        add_header Access-Control-Allow-Headers \"Content-Type\"\
    \ always;\n        if ($request_method = OPTIONS) { return 204; }\n    }\n\n \
    \   location /health {\n        return 200 'OK';\n        add_header Content-Type\
    \ text/plain;\n    }\n}\n"
kind: ConfigMap
metadata:
  name: rack-inventory-chat-nginx
