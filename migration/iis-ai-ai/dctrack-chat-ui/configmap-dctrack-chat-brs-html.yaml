apiVersion: v1
data:
  brs-prompts.html: "<!DOCTYPE html>\n<html lang=\"en\">\n<head>\n    <meta charset=\"\
    UTF-8\">\n    <meta name=\"viewport\" content=\"width=device-width, initial-scale=1.0\"\
    >\n    <title>BRS Prompts | DCIM Lifecycle Demo</title>\n    <link rel=\"preconnect\"\
    \ href=\"https://fonts.googleapis.com\">\n    <link rel=\"preconnect\" href=\"\
    https://fonts.gstatic.com\" crossorigin>\n    <link href=\"https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap\"\
    \ rel=\"stylesheet\">\n    <style>\n        :root {\n            --sunbird-orange:\
    \ #F7941D;\n            --sunbird-orange-light: #FFAD4A;\n            --sunbird-orange-dark:\
    \ #E07D00;\n            --iisl-blue: #1E3A5F;\n            --iisl-blue-light:\
    \ #2C5282;\n            --bg-primary: #0A0E14;\n            --bg-secondary: #111821;\n\
    \            --bg-tertiary: #1A2332;\n            --bg-card: #151D2B;\n      \
    \      --bg-hover: #1F2A3C;\n            --text-primary: #F0F4F8;\n          \
    \  --text-secondary: #A0AEC0;\n            --text-muted: #718096;\n          \
    \  --success: #48BB78;\n            --error: #FC8181;\n            --blue: #63B3ED;\n\
    \            --purple: #B794F4;\n            --border: rgba(255, 255, 255, 0.08);\n\
    \            --border-highlight: rgba(247, 148, 29, 0.3);\n            --shadow-sm:\
    \ 0 2px 8px rgba(0, 0, 0, 0.3);\n            --shadow-md: 0 4px 20px rgba(0, 0,\
    \ 0, 0.4);\n        }\n        * { margin: 0; padding: 0; box-sizing: border-box;\
    \ }\n        body {\n            font-family: 'Plus Jakarta Sans', -apple-system,\
    \ sans-serif;\n            background: var(--bg-primary);\n            color:\
    \ var(--text-primary);\n            min-height: 100vh;\n        }\n\n        /*\
    \ -- Header -- */\n        .header {\n            background: linear-gradient(135deg,\
    \ var(--iisl-blue) 0%, var(--bg-secondary) 100%);\n            border-bottom:\
    \ 1px solid var(--border-highlight);\n            padding: 16px 32px;\n      \
    \      display: flex;\n            align-items: center;\n            justify-content:\
    \ space-between;\n            position: sticky;\n            top: 0;\n       \
    \     z-index: 100;\n            backdrop-filter: blur(12px);\n        }\n   \
    \     .header-left {\n            display: flex;\n            align-items: center;\n\
    \            gap: 16px;\n        }\n        .header-left h1 {\n            font-size:\
    \ 20px;\n            font-weight: 700;\n            background: linear-gradient(135deg,\
    \ var(--sunbird-orange), var(--sunbird-orange-light));\n            -webkit-background-clip:\
    \ text;\n            -webkit-text-fill-color: transparent;\n        }\n      \
    \  .header-left .subtitle {\n            font-size: 13px;\n            color:\
    \ var(--text-muted);\n        }\n        .open-chat-btn {\n            display:\
    \ flex;\n            align-items: center;\n            gap: 8px;\n           \
    \ padding: 10px 20px;\n            background: linear-gradient(135deg, var(--sunbird-orange),\
    \ var(--sunbird-orange-dark));\n            color: #fff;\n            border:\
    \ none;\n            border-radius: 8px;\n            font-size: 14px;\n     \
    \       font-weight: 600;\n            cursor: pointer;\n            transition:\
    \ all 0.2s;\n            font-family: inherit;\n        }\n        .open-chat-btn:hover\
    \ {\n            transform: translateY(-1px);\n            box-shadow: 0 4px 16px\
    \ rgba(247, 148, 29, 0.4);\n        }\n        .connection-dot {\n           \
    \ width: 8px; height: 8px;\n            border-radius: 50%;\n            background:\
    \ var(--error);\n            transition: background 0.3s;\n        }\n       \
    \ .connection-dot.connected { background: var(--success); }\n\n        /* -- Progress\
    \ bar -- */\n        .progress-bar {\n            background: var(--bg-secondary);\n\
    \            border-bottom: 1px solid var(--border);\n            padding: 10px\
    \ 32px;\n            display: flex;\n            align-items: center;\n      \
    \      gap: 16px;\n            position: sticky;\n            top: 62px;\n   \
    \         z-index: 99;\n        }\n        .progress-track {\n            flex:\
    \ 1;\n            height: 6px;\n            background: var(--bg-tertiary);\n\
    \            border-radius: 3px;\n            overflow: hidden;\n        }\n \
    \       .progress-fill {\n            height: 100%;\n            background: linear-gradient(90deg,\
    \ var(--sunbird-orange), var(--success));\n            border-radius: 3px;\n \
    \           transition: width 0.4s ease;\n            width: 0%;\n        }\n\
    \        .progress-text {\n            font-size: 12px;\n            color: var(--text-muted);\n\
    \            white-space: nowrap;\n        }\n\n        /* -- Content -- */\n\
    \        .content {\n            max-width: 1200px;\n            margin: 0 auto;\n\
    \            padding: 24px 32px 80px;\n        }\n\n        /* -- Phase Section\
    \ -- */\n        .phase {\n            margin-bottom: 32px;\n        }\n     \
    \   .phase-header {\n            display: flex;\n            align-items: center;\n\
    \            gap: 12px;\n            padding: 14px 20px;\n            background:\
    \ linear-gradient(135deg, var(--iisl-blue), var(--bg-tertiary));\n           \
    \ border-radius: 10px;\n            margin-bottom: 2px;\n            cursor: pointer;\n\
    \            user-select: none;\n            border: 1px solid var(--border);\n\
    \            transition: border-color 0.2s;\n        }\n        .phase-header:hover\
    \ {\n            border-color: var(--border-highlight);\n        }\n        .phase-badge\
    \ {\n            display: inline-flex;\n            align-items: center;\n   \
    \         justify-content: center;\n            min-width: 28px;\n           \
    \ height: 28px;\n            padding: 0 8px;\n            background: var(--sunbird-orange);\n\
    \            color: #fff;\n            border-radius: 6px;\n            font-size:\
    \ 11px;\n            font-weight: 700;\n        }\n        .phase-title {\n  \
    \          font-size: 16px;\n            font-weight: 700;\n            flex:\
    \ 1;\n        }\n        .phase-count {\n            font-size: 12px;\n      \
    \      color: var(--text-muted);\n            background: var(--bg-primary);\n\
    \            padding: 4px 10px;\n            border-radius: 12px;\n        }\n\
    \        .phase-chevron {\n            color: var(--text-muted);\n           \
    \ transition: transform 0.2s;\n            font-size: 14px;\n        }\n     \
    \   .phase.collapsed .phase-chevron { transform: rotate(-90deg); }\n        .phase.collapsed\
    \ .phase-body { display: none; }\n\n        /* -- Prompt Rows -- */\n        .phase-body\
    \ {\n            border-left: 2px solid var(--border);\n            margin-left:\
    \ 34px;\n            padding-left: 0;\n        }\n        .prompt-row {\n    \
    \        display: flex;\n            align-items: stretch;\n            border-bottom:\
    \ 1px solid var(--border);\n            transition: background 0.15s;\n      \
    \  }\n        .prompt-row:hover { background: var(--bg-hover); }\n        .prompt-row.sent\
    \ { opacity: 0.55; }\n        .prompt-num {\n            width: 52px;\n      \
    \      min-width: 52px;\n            display: flex;\n            align-items:\
    \ center;\n            justify-content: center;\n            font-size: 11px;\n\
    \            font-weight: 600;\n            color: var(--text-muted);\n      \
    \      border-right: 1px solid var(--border);\n        }\n        .prompt-info\
    \ {\n            flex: 1;\n            padding: 12px 16px;\n            min-width:\
    \ 0;\n        }\n        .prompt-label {\n            font-size: 14px;\n     \
    \       font-weight: 600;\n            margin-bottom: 6px;\n            display:\
    \ flex;\n            align-items: center;\n            flex-wrap: wrap;\n    \
    \        gap: 6px;\n        }\n        .prompt-text {\n            font-family:\
    \ 'JetBrains Mono', monospace;\n            font-size: 12px;\n            color:\
    \ var(--text-secondary);\n            line-height: 1.6;\n            white-space:\
    \ pre-wrap;\n            word-break: break-word;\n        }\n        .prompt-expected\
    \ {\n            margin-top: 6px;\n            font-size: 11px;\n            color:\
    \ var(--text-muted);\n            font-style: italic;\n        }\n        .prompt-status\
    \ {\n            width: 40px;\n            min-width: 40px;\n            display:\
    \ flex;\n            align-items: center;\n            justify-content: center;\n\
    \        }\n        .send-prompt-btn {\n            width: 48px;\n           \
    \ min-width: 48px;\n            background: transparent;\n            border:\
    \ none;\n            border-left: 1px solid var(--border);\n            color:\
    \ var(--sunbird-orange);\n            font-size: 18px;\n            cursor: pointer;\n\
    \            transition: all 0.15s;\n            display: flex;\n            align-items:\
    \ center;\n            justify-content: center;\n        }\n        .send-prompt-btn:hover\
    \ {\n            background: rgba(247, 148, 29, 0.1);\n            color: var(--sunbird-orange-light);\n\
    \        }\n        .send-prompt-btn.sent {\n            color: var(--success);\n\
    \        }\n\n        /* Tags */\n        .class-tag {\n            font-size:\
    \ 10px;\n            font-weight: 600;\n            padding: 2px 8px;\n      \
    \      border-radius: 4px;\n            text-transform: uppercase;\n         \
    \   letter-spacing: 0.5px;\n        }\n        .class-tag.query { background:\
    \ #1A2744; color: #63B3ED; }\n        .class-tag.verify { background: #1A362A;\
    \ color: #48BB78; }\n        .class-tag.modify { background: #362A1A; color: #F6AD55;\
    \ }\n        .class-tag.delete { background: #3B1A1A; color: #FC8181; }\n    \
    \    .class-tag.cabinet { background: #2D3748; color: #E2E8F0; }\n        .class-tag.device\
    \ { background: #2D3748; color: #90CDF4; }\n        .class-tag.network { background:\
    \ #2D3748; color: #76E4F7; }\n        .class-tag.rack-pdu { background: #2D3748;\
    \ color: #F687B3; }\n        .class-tag.connection { background: #2D3748; color:\
    \ #76E4F7; }\n        .class-tag.data-port { background: #2D3748; color: #68D391;\
    \ }\n        .class-tag.power-port { background: #2D3748; color: #F687B3; }\n\
    \        .class-tag.power-chain { background: #2D3748; color: #FBD38D; }\n   \
    \     .class-tag.project { background: #1A365D; color: #90CDF4; }\n        .class-tag.change-request\
    \ { background: #362A1A; color: #FBD38D; }\n        .class-tag.work-order { background:\
    \ #2D3748; color: #D6BCFA; }\n        .class-tag.ticket { background: #2D3748;\
    \ color: #FEB2B2; }\n        .class-tag.summary { background: #1A365D; color:\
    \ #90CDF4; }\n        .class-tag.capacity { background: #2D3748; color: #C6F6D5;\
    \ }\n        .class-tag.audit { background: #2D3748; color: #FBD38D; }\n     \
    \   .class-tag.readings { background: #2D3748; color: #FEB2B2; }\n\n        /*\
    \ Toast */\n        .toast {\n            position: fixed;\n            bottom:\
    \ 24px;\n            left: 50%;\n            transform: translateX(-50%) translateY(80px);\n\
    \            background: var(--bg-tertiary);\n            color: var(--text-primary);\n\
    \            padding: 12px 24px;\n            border-radius: 10px;\n         \
    \   font-size: 13px;\n            border: 1px solid var(--border-highlight);\n\
    \            box-shadow: var(--shadow-md);\n            transition: transform\
    \ 0.3s ease;\n            z-index: 200;\n            max-width: 90vw;\n      \
    \      white-space: nowrap;\n            overflow: hidden;\n            text-overflow:\
    \ ellipsis;\n        }\n        .toast.visible { transform: translateX(-50%) translateY(0);\
    \ }\n\n        /* -- Coverage Matrix -- */\n        .coverage-matrix {\n     \
    \       margin-top: 32px;\n            background: var(--bg-card);\n         \
    \   border: 1px solid var(--border);\n            border-radius: 12px;\n     \
    \       padding: 24px;\n        }\n        .coverage-matrix h2 {\n           \
    \ font-size: 18px;\n            font-weight: 700;\n            margin-bottom:\
    \ 16px;\n            color: var(--sunbird-orange);\n            display: flex;\n\
    \            align-items: center;\n            gap: 10px;\n        }\n       \
    \ .coverage-matrix h2 .badge {\n            background: var(--sunbird-orange);\n\
    \            color: #000;\n            font-size: 11px;\n            font-weight:\
    \ 700;\n            padding: 2px 8px;\n            border-radius: 6px;\n     \
    \   }\n        .coverage-table {\n            width: 100%;\n            border-collapse:\
    \ collapse;\n            font-size: 13px;\n        }\n        .coverage-table\
    \ th {\n            background: var(--bg-tertiary);\n            color: var(--sunbird-orange-light);\n\
    \            font-weight: 600;\n            text-align: left;\n            padding:\
    \ 10px 14px;\n            border-bottom: 2px solid var(--border-highlight);\n\
    \            font-size: 12px;\n            text-transform: uppercase;\n      \
    \      letter-spacing: 0.5px;\n        }\n        .coverage-table td {\n     \
    \       padding: 8px 14px;\n            border-bottom: 1px solid var(--border);\n\
    \            color: var(--text-secondary);\n            vertical-align: middle;\n\
    \        }\n        .coverage-table tr:last-child td { border-bottom: none; }\n\
    \        .coverage-table tr:hover td { background: var(--bg-hover); }\n      \
    \  .coverage-table td:first-child {\n            font-weight: 600;\n         \
    \   color: var(--text-primary);\n            white-space: nowrap;\n        }\n\
    \        .coverage-table .check { color: var(--success); font-weight: 700; margin-right:\
    \ 4px; }\n        .coverage-table .none { color: var(--text-muted); }\n      \
    \  .coverage-table .steps { font-size: 11px; color: var(--text-muted); }\n   \
    \     .class-type {\n            font-size: 10px;\n            padding: 1px 6px;\n\
    \            border-radius: 3px;\n            margin-left: 6px;\n        }\n \
    \       .class-type.rackable { background: #1A365D; color: #63B3ED; }\n      \
    \  .class-type.governance { background: #362A1A; color: #FBD38D; }\n        .class-type.connectivity\
    \ { background: #1A362A; color: #48BB78; }\n\n        @media (max-width: 768px)\
    \ {\n            .header { padding: 12px 16px; }\n            .content { padding:\
    \ 16px; }\n            .prompt-num { width: 44px; min-width: 44px; font-size:\
    \ 10px; }\n            .phase-body { margin-left: 22px; }\n        }\n    </style>\n\
    </head>\n<body>\n\n<div class=\"header\">\n    <div class=\"header-left\">\n \
    \       <div>\n            <h1>BRS Prompts &mdash; DCIM Lifecycle Demo</h1>\n\
    \            <div class=\"subtitle\">Discover &rarr; Configure &rarr; Expand &mdash;\
    \ 3 Change Requests with Full Audit Trail</div>\n        </div>\n    </div>\n\
    \    <div style=\"display:flex; align-items:center; gap:12px;\">\n        <div\
    \ class=\"connection-dot\" id=\"connDot\" title=\"Chat tab not connected\"></div>\n\
    \        <button class=\"open-chat-btn\" id=\"openChatBtn\">\n            <svg\
    \ width=\"16\" height=\"16\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\"\
    \ stroke-width=\"2\"><path d=\"M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2\
    \ 2 0 0 1 2 2z\"/></svg>\n            Open Chat\n        </button>\n    </div>\n\
    </div>\n\n<div class=\"progress-bar\">\n    <div class=\"progress-track\"><div\
    \ class=\"progress-fill\" id=\"progressFill\"></div></div>\n    <div class=\"\
    progress-text\" id=\"progressText\">0 / 0 prompts sent</div>\n</div>\n\n<div class=\"\
    content\" id=\"content\"></div>\n\n<div class=\"toast\" id=\"toast\"></div>\n\n\
    <script>\n// --- Data ---\nconst PHASES = [\n  // \u2550\u2550\u2550\u2550\u2550\
    \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\
    \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\
    \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\
    \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\
    \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\n  // PHASE\
    \ 1: Rack Discovery via Visual AI\n  // Story: Start by discovering what's already\
    \ in the rack\n  // \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\
    \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\
    \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\
    \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\
    \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\
    \u2550\u2550\u2550\u2550\u2550\u2550\n  {\n    id: 'phase1', title: 'Rack Discovery\
    \ via Visual AI', badge: '1',\n    prompts: [\n      { num: '1.1', label: '\\\
    u{1F4F7} Upload Rack Photo', prompt: '\\u27A1\\uFE0F SWITCH TO RACK DISCOVERY\
    \ AI \\u27A1\\uFE0F\\n\\nOpen https://rack-inventory-chat.apps.ocp419.crucible.iisl.com/\\\
    nUpload a photo of the rack cabinet.\\nAI identifies all equipment and shows an\
    \ editable inventory.\\nClick \"Create Cabinet in dcTrack\" to push everything.\\\
    n\\nThis creates AI-CAB-01 with all discovered items.', expected: 'AI-CAB-01 created\
    \ with all discovered equipment.', tags: ['cabinet','device','network'] },\n \
    \     { num: '1.2', label: 'Verify Discovery', prompt: 'What items are in cabinet\
    \ AI-CAB-01?', expected: '10 items: 7 Dell C6100, 1 HP KVM, 1 Nexus, 1 Meraki.',\
    \ tags: ['verify'] },\n      { num: '1.3', label: 'U-Position Map', prompt: 'Show\
    \ U-position map for AI-CAB-01', expected: 'All items at correct U positions.\
    \ U19+ free.', tags: ['query','cabinet'] },\n      { num: '1.4', label: 'Rack\
    \ Summary', prompt: 'Show rack summary for AI-CAB-01', expected: '10 items, all\
    \ Planned, no connections.', tags: ['summary','query'] },\n    ]\n  },\n\n  //\
    \ \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\
    \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\
    \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\
    \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\
    \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\
    \u2550\u2550\u2550\n  // PHASE 2: Create Project & 3 Change Requests\n  // Story:\
    \ Now that items exist, create governance (tracked in Change > Tickets)\n  //\
    \ \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\
    \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\
    \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\
    \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\
    \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\
    \u2550\u2550\u2550\n  {\n    id: 'phase2', title: 'Project & 3 Tickets (CR-1,\
    \ CR-2, CR-3)', badge: '2',\n    prompts: [\n      { num: '2.1', label: 'Create\
    \ Project', prompt: 'Create a dcTrack project named \"RM01-AI-CAB-01 Lifecycle\"\
    \ with number \"PRJ-RM01-001\", description \"Full DCIM lifecycle: Discover, Configure,\
    \ Expand\", location \"AI-ROOM-01\", status \"In Progress\"', expected: 'Project\
    \ created.', tags: ['project'] },\n      { num: '2.2', label: 'Verify Project',\
    \ prompt: 'Show details of project \"RM01-AI-CAB-01 Lifecycle\"', expected: 'Project\
    \ visible.', tags: ['verify','project'] },\n      { num: '2.3', label: 'Ticket:\
    \ CR-1 Discovery', prompt: 'Create a ticket: \"CR-1: Rack Discovery complete.\
    \ AI-CAB-01 populated with 10 items via Visual AI scan of existing rack.\"', expected:\
    \ 'Ticket created (Change > Tickets in dcTrack).', tags: ['change-request'] },\n\
    \      { num: '2.4', label: 'Ticket: CR-2 Configure', prompt: 'Create a ticket:\
    \ \"Ticket: CR-2 Configure Existing Infrastructure. Install PDU, wire power connections\
    \ from PDU to all devices, wire network from servers to Meraki and uplink to Nexus.\"\
    ', expected: 'Ticket created.', tags: ['change-request'] },\n      { num: '2.5',\
    \ label: 'Ticket: CR-3 Expand', prompt: 'Create a ticket: \"CR-3: Onboard 4 New\
    \ Servers into AI-CAB-01 at U20-U26. Connect network to Nexus 9236C and power\
    \ to existing PDU.\"', expected: 'Ticket created.', tags: ['change-request'] },\n\
    \      { num: '2.6', label: 'Verify Tickets', prompt: 'List all tickets in dcTrack',\
    \ expected: '3 tickets visible in Change > Tickets.', tags: ['verify'] },\n  \
    \  ]\n  },\n\n  // \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\
    \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\
    \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\
    \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\
    \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\
    \u2550\u2550\u2550\u2550\u2550\u2550\n  // PHASE 3-5: CR-2 \u2014 Configure Existing\
