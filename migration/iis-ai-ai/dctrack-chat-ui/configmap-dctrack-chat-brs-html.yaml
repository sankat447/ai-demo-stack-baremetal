    16\" y1=\"13\" x2=\"8\" y2=\"13\"/><line x1=\"16\" y1=\"17\" x2=\"8\" y2=\"17\"\
    /><polyline points=\"10 9 9 9 8 9\"/></svg>\n        BRS Execution Summary\n \
    \       <span class=\"badge\">9 Phases &bull; ${totalPrompts} Prompts</span>\n\
    \    </h2>\n    <table class=\"coverage-table\">\n        <thead>\n          \
    \  <tr>\n                <th>Phase</th>\n                <th>Title</th>\n    \
    \            <th style=\"text-align:center\">Prompts</th>\n                <th>BRS\
    \ Requirement Covered</th>\n            </tr>\n        </thead>\n        <tbody>\n\
    \            ${summaryData.map(r => `\n                <tr>\n                \
    \    <td><span class=\"phase-badge\" style=\"font-size:11px;min-width:24px;height:24px;padding:0\
