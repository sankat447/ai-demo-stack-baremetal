    \                    <td style=\"font-weight:600;color:var(--text-primary)\">${r.title}</td>\n\
    \                    <td style=\"text-align:center;color:var(--sunbird-orange);font-weight:700\"\
    >${r.prompts}</td>\n                    <td>${r.requirement}</td>\n          \
    \      </tr>\n            `).join('')}\n            <tr style=\"border-top:2px\
    \ solid var(--border-highlight)\">\n                <td></td>\n              \
    \  <td style=\"font-weight:700;color:var(--sunbird-orange)\">Total</td>\n    \
    \            <td style=\"text-align:center;color:var(--sunbird-orange);font-weight:700;font-size:15px\"\
    >${totalPrompts}</td>\n                <td style=\"color:var(--text-muted);font-style:italic\"\
    >Full BRS lifecycle: plan \\u2192 approve \\u2192 execute \\u2192 verify \\u2192\
