    });\n\n// --- Coverage Matrix ---\nconst coverageData = [\n    { cls: 'Project',\
    \            type: 'governance',   create: '2.1',       verify: '2.2',       \
    \   modify: '8.8',       del: '9.7' },\n    { cls: 'Tickets (CRs+WOs)', type:\
