    \n// Count initial sent\nsentSet.forEach(n => sentCount++);\nupdateProgress();\n\
    \nfunction escHtml(s) {\n    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\"\
