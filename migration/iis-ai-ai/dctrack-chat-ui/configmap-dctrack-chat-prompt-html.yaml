apiVersion: v1
data:
  prompt.html: "<!DOCTYPE html>\n<html lang=\"en\">\n<head>\n    <meta charset=\"\
    UTF-8\">\n    <meta name=\"viewport\" content=\"width=device-width, initial-scale=1.0\"\
    >\n    <title>Demo Prompts | Sunbird DCIM AI Assistant</title>\n    <link rel=\"\
    preconnect\" href=\"https://fonts.googleapis.com\">\n    <link rel=\"preconnect\"\
    \ href=\"https://fonts.gstatic.com\" crossorigin>\n    <link href=\"https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap\"\
    \ rel=\"stylesheet\">\n    <style>\n        :root {\n            --sunbird-orange:\
    \ #F7941D;\n            --sunbird-orange-light: #FFAD4A;\n            --sunbird-orange-dark:\
    \ #E07D00;\n            --iisl-blue: #1E3A5F;\n            --iisl-blue-light:\
    \ #2C5282;\n            --bg-primary: #0A0E14;\n            --bg-secondary: #111821;\n\
    \            --bg-tertiary: #1A2332;\n            --bg-card: #151D2B;\n      \
    \      --bg-hover: #1F2A3C;\n            --text-primary: #F0F4F8;\n          \
    \  --text-secondary: #A0AEC0;\n            --text-muted: #718096;\n          \
    \  --success: #48BB78;\n            --error: #FC8181;\n            --blue: #63B3ED;\n\
    \            --purple: #B794F4;\n            --border: rgba(255, 255, 255, 0.08);\n\
    \            --border-highlight: rgba(247, 148, 29, 0.3);\n            --shadow-sm:\
    \ 0 2px 8px rgba(0, 0, 0, 0.3);\n            --shadow-md: 0 4px 20px rgba(0, 0,\
    \ 0, 0.4);\n        }\n        * { margin: 0; padding: 0; box-sizing: border-box;\
    \ }\n        body {\n            font-family: 'Plus Jakarta Sans', -apple-system,\
    \ sans-serif;\n            background: var(--bg-primary);\n            color:\
    \ var(--text-primary);\n            min-height: 100vh;\n        }\n\n        /*\
    \ \u2500\u2500 Header \u2500\u2500 */\n        .header {\n            background:\
    \ linear-gradient(135deg, var(--iisl-blue) 0%, var(--bg-secondary) 100%);\n  \
    \          border-bottom: 1px solid var(--border-highlight);\n            padding:\
    \ 16px 32px;\n            display: flex;\n            align-items: center;\n \
    \           justify-content: space-between;\n            position: sticky;\n \
    \           top: 0;\n            z-index: 100;\n            backdrop-filter: blur(12px);\n\
    \        }\n        .header-left {\n            display: flex;\n            align-items:\
    \ center;\n            gap: 16px;\n        }\n        .header-left h1 {\n    \
    \        font-size: 20px;\n            font-weight: 700;\n            background:\
    \ linear-gradient(135deg, var(--sunbird-orange), var(--sunbird-orange-light));\n\
    \            -webkit-background-clip: text;\n            -webkit-text-fill-color:\
    \ transparent;\n        }\n        .header-left .subtitle {\n            font-size:\
    \ 13px;\n            color: var(--text-muted);\n        }\n        .open-chat-btn\
    \ {\n            display: flex;\n            align-items: center;\n          \
    \  gap: 8px;\n            padding: 10px 20px;\n            background: linear-gradient(135deg,\
    \ var(--sunbird-orange), var(--sunbird-orange-dark));\n            color: #fff;\n\
    \            border: none;\n            border-radius: 8px;\n            font-size:\
    \ 14px;\n            font-weight: 600;\n            cursor: pointer;\n       \
    \     transition: all 0.2s;\n            font-family: inherit;\n        }\n  \
    \      .open-chat-btn:hover {\n            transform: translateY(-1px);\n    \
    \        box-shadow: 0 4px 16px rgba(247, 148, 29, 0.4);\n        }\n        .connection-dot\
    \ {\n            width: 8px; height: 8px;\n            border-radius: 50%;\n \
    \           background: var(--error);\n            transition: background 0.3s;\n\
    \        }\n        .connection-dot.connected { background: var(--success); }\n\
    \n        /* \u2500\u2500 Progress bar \u2500\u2500 */\n        .progress-bar\
    \ {\n            background: var(--bg-secondary);\n            border-bottom:\
    \ 1px solid var(--border);\n            padding: 10px 32px;\n            display:\
    \ flex;\n            align-items: center;\n            gap: 16px;\n          \
    \  position: sticky;\n            top: 62px;\n            z-index: 99;\n     \
    \   }\n        .progress-track {\n            flex: 1;\n            height: 6px;\n\
    \            background: var(--bg-tertiary);\n            border-radius: 3px;\n\
    \            overflow: hidden;\n        }\n        .progress-fill {\n        \
    \    height: 100%;\n            background: linear-gradient(90deg, var(--sunbird-orange),\
    \ var(--success));\n            border-radius: 3px;\n            transition: width\
    \ 0.4s ease;\n            width: 0%;\n        }\n        .progress-text {\n  \
    \          font-size: 12px;\n            color: var(--text-muted);\n         \
    \   white-space: nowrap;\n        }\n\n        /* \u2500\u2500 Content \u2500\u2500\
    \ */\n        .content {\n            max-width: 1200px;\n            margin:\
    \ 0 auto;\n            padding: 24px 32px 80px;\n        }\n\n        /* \u2500\
    \u2500 Phase Section \u2500\u2500 */\n        .phase {\n            margin-bottom:\
    \ 32px;\n        }\n        .phase-header {\n            display: flex;\n    \
    \        align-items: center;\n            gap: 12px;\n            padding: 14px\
    \ 20px;\n            background: linear-gradient(135deg, var(--iisl-blue), var(--bg-tertiary));\n\
    \            border-radius: 10px;\n            margin-bottom: 2px;\n         \
    \   cursor: pointer;\n            user-select: none;\n            border: 1px\
    \ solid var(--border);\n            transition: border-color 0.2s;\n        }\n\
    \        .phase-header:hover {\n            border-color: var(--border-highlight);\n\
    \        }\n        .phase-badge {\n            display: inline-flex;\n      \
    \      align-items: center;\n            justify-content: center;\n          \
    \  min-width: 28px;\n            height: 28px;\n            padding: 0 8px;\n\
    \            background: var(--sunbird-orange);\n            color: #fff;\n  \
    \          border-radius: 6px;\n            font-size: 11px;\n            font-weight:\
    \ 700;\n        }\n        .phase-title {\n            font-size: 16px;\n    \
    \        font-weight: 700;\n            flex: 1;\n        }\n        .phase-count\
    \ {\n            font-size: 12px;\n            color: var(--text-muted);\n   \
    \         background: var(--bg-primary);\n            padding: 4px 10px;\n   \
    \         border-radius: 12px;\n        }\n        .phase-chevron {\n        \
    \    color: var(--text-muted);\n            transition: transform 0.2s;\n    \
    \        font-size: 14px;\n        }\n        .phase.collapsed .phase-chevron\
    \ { transform: rotate(-90deg); }\n        .phase.collapsed .phase-body { display:\
    \ none; }\n\n        /* \u2500\u2500 Prompt Rows \u2500\u2500 */\n        .phase-body\
    \ {\n            border-left: 2px solid var(--border);\n            margin-left:\
    \ 34px;\n            padding-left: 0;\n        }\n        .prompt-row {\n    \
    \        display: flex;\n            align-items: stretch;\n            border-bottom:\
    \ 1px solid var(--border);\n            transition: background 0.15s;\n      \
    \      position: relative;\n        }\n        .prompt-row:hover {\n         \
    \   background: var(--bg-hover);\n        }\n        .prompt-row.sent {\n    \
    \        opacity: 0.5;\n        }\n        .prompt-row.sent .prompt-status::after\
    \ {\n            content: '\\2713';\n            color: var(--success);\n    \
    \        font-size: 14px;\n            font-weight: 700;\n        }\n        .prompt-num\
    \ {\n            width: 60px;\n            min-width: 60px;\n            display:\
    \ flex;\n            align-items: center;\n            justify-content: center;\n\
    \            font-size: 11px;\n            font-weight: 600;\n            color:\
    \ var(--text-muted);\n            font-family: 'JetBrains Mono', monospace;\n\
    \        }\n        .prompt-info {\n            flex: 1;\n            padding:\
    \ 12px 16px;\n            display: flex;\n            flex-direction: column;\n\
    \            gap: 6px;\n            min-width: 0;\n        }\n        .prompt-label\
    \ {\n            font-size: 13px;\n            font-weight: 600;\n           \
    \ color: var(--text-secondary);\n            display: flex;\n            align-items:\
    \ center;\n            gap: 8px;\n            flex-wrap: wrap;\n        }\n  \
    \      .class-tag {\n            font-size: 10px;\n            font-weight: 600;\n\
    \            padding: 2px 8px;\n            border-radius: 4px;\n            text-transform:\
    \ uppercase;\n            letter-spacing: 0.5px;\n        }\n        .class-tag.device\
    \ { background: #2D3748; color: #63B3ED; }\n        .class-tag.network { background:\
    \ #2D3748; color: #B794F4; }\n        .class-tag.rack-pdu { background: #2D3748;\
    \ color: #FC8181; }\n        .class-tag.data-panel { background: #2D3748; color:\
    \ #48BB78; }\n        .class-tag.passive { background: #2D3748; color: #A0AEC0;\
    \ }\n        .class-tag.probe { background: #2D3748; color: #F6AD55; }\n     \
    \   .class-tag.cabinet { background: #2D3748; color: #FFC107; }\n        .class-tag.ticket\
    \ { background: #2D3748; color: #D6BCFA; }\n        .class-tag.query { background:\
    \ #1A365D; color: #63B3ED; }\n        .class-tag.modify { background: #362A1A;\
    \ color: #F6AD55; }\n        .class-tag.delete { background: #3B1A1A; color: #FC8181;\
    \ }\n        .class-tag.verify { background: #1A362A; color: #48BB78; }\n    \
    \    .class-tag.data-port { background: #2D3748; color: #68D391; }\n        .class-tag.power-port\
    \ { background: #2D3748; color: #F687B3; }\n        .class-tag.connection { background:\
    \ #2D3748; color: #76E4F7; }\n        .class-tag.power-chain { background: #2D3748;\
    \ color: #FBD38D; }\n        .class-tag.readings { background: #2D3748; color:\
    \ #FEB2B2; }\n        .class-tag.summary { background: #1A365D; color: #90CDF4;\
    \ }\n        .class-tag.capacity { background: #2D3748; color: #C6F6D5; }\n  \
    \      .class-tag.free-standing { background: #2D3748; color: #D6BCFA; }\n   \
    \     .class-tag.floor-pdu { background: #2D3748; color: #F687B3; }\n        .class-tag.power-outlet\
    \ { background: #2D3748; color: #FEB2B2; }\n\n        .prompt-text {\n       \
    \     font-family: 'JetBrains Mono', monospace;\n            font-size: 13px;\n\
    \            color: var(--text-primary);\n            background: var(--bg-primary);\n\
    \            padding: 8px 12px;\n            border-radius: 6px;\n           \
    \ border: 1px solid var(--border);\n            white-space: pre-wrap;\n     \
    \       word-break: break-word;\n        }\n        .prompt-expected {\n     \
    \       font-size: 11px;\n            color: var(--text-muted);\n            font-style:\
    \ italic;\n        }\n        .prompt-status {\n            width: 24px;\n   \
    \         display: flex;\n            align-items: center;\n            justify-content:\
    \ center;\n        }\n        .send-prompt-btn {\n            width: 52px;\n \
    \           min-width: 52px;\n            display: flex;\n            align-items:\
    \ center;\n            justify-content: center;\n            background: none;\n\
    \            border: none;\n            border-left: 1px solid var(--border);\n\
    \            cursor: pointer;\n            color: var(--sunbird-orange);\n   \
    \         font-size: 20px;\n            transition: all 0.15s;\n        }\n  \
    \      .send-prompt-btn:hover {\n            background: rgba(247, 148, 29, 0.1);\n\
    \            color: var(--sunbird-orange-light);\n        }\n        .send-prompt-btn:active\
    \ {\n            background: rgba(247, 148, 29, 0.2);\n            transform:\
    \ scale(0.95);\n        }\n        .send-prompt-btn.sent {\n            color:\
    \ var(--success);\n            cursor: default;\n        }\n\n        /* \u2500\
    \u2500 Note rows \u2500\u2500 */\n        .prompt-row.note-row {\n           \
    \ background: rgba(247, 148, 29, 0.03);\n        }\n        .prompt-row.note-row\
    \ .prompt-text {\n            background: rgba(247, 148, 29, 0.06);\n        \
    \    border-color: var(--border-highlight);\n            color: var(--sunbird-orange-light);\n\
    \            font-family: 'Plus Jakarta Sans', sans-serif;\n            font-style:\
    \ italic;\n        }\n\n        /* \u2500\u2500 Toast \u2500\u2500 */\n      \
    \  .toast {\n            position: fixed;\n            bottom: 24px;\n       \
    \     left: 50%;\n            transform: translateX(-50%) translateY(80px);\n\
    \            background: var(--bg-tertiary);\n            color: var(--text-primary);\n\
    \            padding: 12px 24px;\n            border-radius: 10px;\n         \
    \   font-size: 14px;\n            font-weight: 500;\n            border: 1px solid\
    \ var(--border-highlight);\n            box-shadow: var(--shadow-md);\n      \
    \      z-index: 1000;\n            transition: transform 0.3s ease;\n        \
    \    pointer-events: none;\n        }\n        .toast.visible {\n            transform:\
    \ translateX(-50%) translateY(0);\n        }\n\n        /* \u2500\u2500 Responsive\
    \ \u2500\u2500 */\n        @media (max-width: 768px) {\n            .header {\
    \ padding: 12px 16px; }\n            .content { padding: 16px; }\n           \
    \ .prompt-num { width: 44px; min-width: 44px; font-size: 10px; }\n           \
    \ .phase-body { margin-left: 22px; }\n        }\n\n        /* \u2500\u2500 Coverage\
    \ Matrix \u2500\u2500 */\n        .coverage-matrix {\n            margin-top:\
    \ 32px;\n            background: var(--bg-card);\n            border: 1px solid\
    \ var(--border);\n            border-radius: 12px;\n            padding: 24px;\n\
    \        }\n        .coverage-matrix h2 {\n            font-size: 18px;\n    \
    \        font-weight: 700;\n            margin-bottom: 16px;\n            color:\
    \ var(--sunbird-orange);\n            display: flex;\n            align-items:\
    \ center;\n            gap: 10px;\n        }\n        .coverage-matrix h2 .badge\
    \ {\n            background: var(--sunbird-orange);\n            color: #000;\n\
    \            font-size: 11px;\n            font-weight: 700;\n            padding:\
    \ 2px 8px;\n            border-radius: 6px;\n        }\n        .coverage-table\
    \ {\n            width: 100%;\n            border-collapse: collapse;\n      \
    \      font-size: 13px;\n        }\n        .coverage-table th {\n           \
    \ background: var(--bg-tertiary);\n            color: var(--sunbird-orange-light);\n\
    \            font-weight: 600;\n            text-align: left;\n            padding:\
    \ 10px 14px;\n            border-bottom: 2px solid var(--border-highlight);\n\
    \            font-size: 12px;\n            text-transform: uppercase;\n      \
    \      letter-spacing: 0.5px;\n        }\n        .coverage-table td {\n     \
    \       padding: 8px 14px;\n            border-bottom: 1px solid var(--border);\n\
    \            color: var(--text-secondary);\n            vertical-align: middle;\n\
    \        }\n        .coverage-table tr:last-child td { border-bottom: none; }\n\
    \        .coverage-table tr:hover td { background: var(--bg-hover); }\n      \
    \  .coverage-table td:first-child {\n            font-weight: 600;\n         \
    \   color: var(--text-primary);\n            white-space: nowrap;\n        }\n\
    \        .coverage-table .check {\n            color: var(--success);\n      \
    \      font-weight: 600;\n        }\n        .coverage-table .steps {\n      \
    \      color: var(--text-muted);\n            font-size: 11px;\n            font-family:\
    \ 'JetBrains Mono', monospace;\n            margin-left: 4px;\n        }\n   \
    \     .coverage-table .none {\n            color: var(--text-muted);\n       \
    \     opacity: 0.5;\n        }\n        .coverage-table .class-type {\n      \
    \      font-size: 10px;\n            padding: 1px 6px;\n            border-radius:\
    \ 4px;\n            margin-left: 6px;\n            font-weight: 500;\n       \
    \ }\n        .class-type.rackable { background: rgba(99,179,237,0.15); color:\
    \ var(--blue); }\n        .class-type.freestanding { background: rgba(183,148,244,0.15);\
    \ color: var(--purple); }\n\n        @media (max-width: 768px) {\n           \
    \ .coverage-table { font-size: 11px; }\n            .coverage-table th, .coverage-table\
    \ td { padding: 6px 8px; }\n            .coverage-table .steps { display: none;\
    \ }\n        }\n    </style>\n</head>\n<body>\n\n<div class=\"header\">\n    <div\
    \ class=\"header-left\">\n        <div>\n            <h1>Demo Prompts</h1>\n \
    \           <div class=\"subtitle\">Sunbird DCIM AI Assistant &mdash; Full Functionality\
    \ Walkthrough</div>\n        </div>\n    </div>\n    <div style=\"display:flex;\
    \ align-items:center; gap:12px;\">\n        <div class=\"connection-dot\" id=\"\
    connDot\" title=\"Chat tab not connected\"></div>\n        <button class=\"open-chat-btn\"\
    \ id=\"openChatBtn\">\n            <svg width=\"16\" height=\"16\" viewBox=\"\
    0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\"><path d=\"\
    M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z\"/></svg>\n    \
    \        Open Chat\n        </button>\n    </div>\n</div>\n\n<div class=\"progress-bar\"\
    >\n    <div class=\"progress-track\"><div class=\"progress-fill\" id=\"progressFill\"\
    ></div></div>\n    <div class=\"progress-text\" id=\"progressText\">0 / 0 prompts\
    \ sent</div>\n</div>\n\n<div class=\"content\" id=\"content\"></div>\n\n<div class=\"\
    toast\" id=\"toast\"></div>\n\n<script>\n// \u2500\u2500\u2500 Data \u2500\u2500\
    \u2500\nconst PHASES = [\n  {\n    id: 'phase1', title: 'Verify Clean State',\
    \ badge: '1',\n    prompts: [\n      { num: '1.1', label: 'List Locations', prompt:\
    \ 'List all locations in dcTrack', expected: 'AI-DEMO-DC > AI-ROOM-01 visible\
    \ in hierarchy.', tags: ['query'] },\n      { num: '1.2', label: 'Confirm Location\
    \ Empty', prompt: 'Search for all items in location AI-ROOM-01', expected: 'No\
    \ items found.', tags: ['verify'] },\n      { num: '1.3', label: 'Confirm No Cabinets',\
    \ prompt: 'Find cabinets in AI-ROOM-01', expected: 'No cabinets found.', tags:\
    \ ['verify'] },\n    ]\n  },\n  {\n    id: 'phase2', title: 'Create Infrastructure',\
    \ badge: '2',\n    prompts: [\n      { num: '2.1', label: 'Bulk Create Cabinets',\
    \ prompt: 'Create the following in AI-DEMO-DC in AI-ROOM-01:\\n\\nCabinets:\\\
    n- Cabinet AI-CAB-01 make Rittal model Orsted VX5311.116\\n- Cabinet AI-CAB-02\
    \ make Rittal model Orsted VX5311.116\\n- Cabinet AI-CAB-03 make Rittal model\
    \ Orsted VX5311.116', expected: '3 cabinets created.', tags: ['cabinet'] },\n\
    \      { num: '2.2', label: 'Verify Cabinets', prompt: 'List all cabinets in AI-ROOM-01',\
    \ expected: 'AI-CAB-01, AI-CAB-02, AI-CAB-03 visible.', tags: ['verify'] },\n\
    \      { num: '2.3', label: 'Bulk Create CAB-01 Items', prompt: 'Create the following\
    \ items in cabinet AI-CAB-01, all status Planned:\\n\\n- \"AI-PDU-A1\" make APC\
    \ model AP8861 class Rack PDU mounting ZeroU\\n- \"AI-PDU-A2\" make APC model\
    \ AP8865 class Rack PDU mounting ZeroU\\n- \"AI-PROBE-01\" make Geist model RSE-B\
    \ class Probe at U42\\n- \"AI-PATCH-01\" make Panduit model \"1RU-CP Panel RJ45\
    \ 24-port CAT6\" class Data Panel at U41\\n- \"AI-WM-01\" make APC model \"1RU-Wire\
    \ Manager AR8602\" class Passive at U40\\n- \"AI-SRV-01\" make Dell model \"PowerEdge\
    \ R740\" class Device at U1\\n- \"AI-SRV-02\" make Dell model \"PowerEdge R740\"\
    \ class Device at U3\\n- \"AI-SRV-03\" make Dell model \"PowerEdge R640\" class\
    \ Device at U5\\n- \"AI-SRV-04\" make Dell model \"PowerEdge R650\" class Device\
    \ at U6\\n- \"AI-BLANK-01\" make APC model \"1RU-Blanking Plate-APC\" class Passive\
    \ at U7', expected: '10 items created in CAB-01. 8U used + 2 ZeroU PDUs.', tags:\
    \ ['device','rack-pdu','probe','data-panel','passive'] },\n      { num: '2.4',\
    \ label: 'Bulk Create CAB-02 Items', prompt: 'Create the following items in cabinet\
    \ AI-CAB-02, all status Planned:\\n\\n- \"AI-PDU-B1\" make APC model AP8841 class\
    \ Rack PDU mounting ZeroU\\n- \"AI-PDU-B2\" make APC model AP8841 class Rack PDU\
    \ mounting ZeroU\\n- \"AI-TOR-01\" make Cisco model \"Nexus N9K-C9372PX\" class\
    \ Network at U42\\n- \"AI-TOR-02\" make Cisco model \"Nexus N9K-C93180YC-EX\"\
    \ class Network at U41\\n- \"AI-PATCH-02\" make Panduit model \"1RU-DP6 Panel\
    \ RJ45 24-port CAT6\" class Data Panel at U40\\n- \"AI-WM-02\" make APC model\
    \ \"1RU-Wire Manager AR8602\" class Passive at U39\\n- \"AI-PATCH-03\" make Panduit\
    \ model \"1RU-CP Panel RJ45 24-port CAT6A\" class Data Panel at U38\\n- \"AI-SRV-05\"\
    \ make Dell model \"PowerEdge R730\" class Device at U1\\n- \"AI-SRV-06\" make\
    \ Dell model \"PowerEdge R720\" class Device at U3\\n- \"AI-BLANK-02\" make APC\
    \ model \"2RU-Blanking Plate-APC\" class Passive at U5', expected: '10 items created\
    \ in CAB-02. 11U used + 2 ZeroU PDUs.', tags: ['device','network','rack-pdu','data-panel','passive']\
    \ },\n      { num: '2.5', label: 'Bulk Create CAB-03 Items', prompt: 'Create the\
    \ following items in cabinet AI-CAB-03, all status Planned:\\n\\n- \"AI-PDU-C1\"\
    \ make APC model AP8853 class Rack PDU mounting ZeroU\\n- \"AI-SRV-07\" make Dell\
    \ model \"PowerEdge R740xd\" class Device at U1\\n- \"AI-SRV-08\" make Dell model\
    \ \"PowerEdge R730xd\" class Device at U3\\n- \"AI-TOR-03\" make Cisco model \"\
    Nexus N9K-C9372TX\" class Network at U42\\n- \"AI-PROBE-02\" make APC model AP9340\
    \ class Probe at U41\\n- \"AI-PATCH-04\" make Panduit model \"1RU-CPP Panel RJ45\
    \ 24-port CAT6\" class Data Panel at U40\\n- \"AI-WM-03\" make APC model \"2RU-Wire\
    \ Manager AR8600\" class Passive at U38\\n- \"AI-BLANK-03\" make APC model \"\
    4RU-Blanking Plate-APC\" class Passive at U5', expected: '8 items created in CAB-03.\
    \ 12U used + 1 ZeroU PDU.', tags: ['device','network','rack-pdu','probe','data-panel','passive']\
    \ },\n      { num: '2.6', label: 'Create Room Infrastructure', prompt: 'Create\
    \ the following free-standing items in location AI-ROOM-01, all status Planned:\\\
    n\\n- \"AI-UPS-01\" make APC model \"MGE Galaxy 3000 G3KUPS10\" class UPS\\n-\
    \ \"AI-FPDU-01\" make APC model \"PDPM72F-5U\" class \"Floor PDU\"\\n- \"AI-CRAC-01\"\
    \ make APC model ACCS1000 class HVAC\\n- \"AI-PWR-OUT-01\" make Hubbell model\
    \ \"Power Outlet Box\" class \"Power Outlet\"', expected: '4 free-standing items\
    \ created in room (no cabinet).', tags: ['ups','floor-pdu','hvac','power-outlet']\
    \ },\n      { num: '2.7', label: 'Create Ticket', prompt: 'Create a new ticket\
    \ with description \"AI-ROOM-01 Commissioning: Install and cable 3 cabinets of\
