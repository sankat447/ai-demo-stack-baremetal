apiVersion: v1
data:
  index.js: "/**\n * Sunbird dcTrack & Power IQ MCP Server - Fixed Edition\n * Handles\
    \ 308 redirect issues with proper URL normalization\n */\n\nconst http = require(\"\
    http\");\nconst https = require(\"https\");\nconst fs = require(\"fs\");\n\n//\
    \ Configuration - strip https:// prefix if present\nconst stripProtocol = (url)\
    \ => url ? url.replace(/^https?:\\/\\//, '') : url;\nconst POWERIQ_URL = stripProtocol(process.env.POWERIQ_URL\
    \ || process.env.POWERIQ_BASE_URL || \"192.168.200.201\");\nconst DCTRACK_URL\
    \ = stripProtocol(process.env.DCTRACK_URL || process.env.DCTRACK_BASE_URL || \"\
    192.168.200.202\");\nconst AUTH = process.env.AUTH_HEADER || \"Basic QVBJOn4hVW5pdmVyc2FsMQ==\"\
    ;\nconst PORT = process.env.PORT || 8080;\n\nconsole.log(`Config: DCTRACK=${DCTRACK_URL},\
    \ POWERIQ=${POWERIQ_URL}`);\n\n// Tool definitions\nconst TOOLS = [\n  { name:\
    \ \"dctrack_list_locations\", description: \"List all locations from dcTrack\"\
    , agent: \"dctrack\" },\n  { name: \"dctrack_get_location\", description: \"Get\
    \ location by ID\", agent: \"dctrack\" },\n  { name: \"dctrack_create_location\"\
    , description: \"Create a new location\", agent: \"dctrack\" },\n  { name: \"\
    dctrack_list_items\", description: \"List items (cabinets, devices, etc.)\", agent:\
    \ \"dctrack\" },\n  { name: \"dctrack_search_items\", description: \"Search items\
    \ with filters\", agent: \"dctrack\" },\n  { name: \"dctrack_get_item\", description:\
    \ \"Get item by ID\", agent: \"dctrack\" },\n  { name: \"dctrack_create_item\"\
    , description: \"Create a new item\", agent: \"dctrack\" },\n  { name: \"dctrack_update_item\"\
    , description: \"Update an existing item\", agent: \"dctrack\" },\n  { name: \"\
    dctrack_delete_item\", description: \"Delete an item\", agent: \"dctrack\" },\n\
    \  { name: \"dctrack_list_cabinets\", description: \"List all cabinets\", agent:\
    \ \"dctrack\" },\n  { name: \"dctrack_get_cabinet_capacity\", description: \"\
    Get cabinet capacity and U space\", agent: \"dctrack\" },\n  { name: \"dctrack_list_models\"\
    , description: \"List all models/makes\", agent: \"dctrack\" },\n  { name: \"\
    dctrack_get_model\", description: \"Get model by ID\", agent: \"dctrack\" },\n\
    \  { name: \"dctrack_list_power_ports\", description: \"List power ports for an\
    \ item\", agent: \"dctrack\" },\n  { name: \"dctrack_list_data_ports\", description:\
    \ \"List data ports for an item\", agent: \"dctrack\" },\n  { name: \"dctrack_create_power_connection\"\
    , description: \"Create power connection\", agent: \"dctrack\" },\n  { name: \"\
    dctrack_create_data_connection\", description: \"Create data connection\", agent:\
    \ \"dctrack\" },\n  { name: \"poweriq_list_pdus\", description: \"List PDUs from\
    \ Power IQ\", agent: \"poweriq\" },\n  { name: \"poweriq_get_pdu\", description:\
    \ \"Get PDU by ID\", agent: \"poweriq\" },\n  { name: \"poweriq_list_outlets\"\
    , description: \"List outlets for a PDU\", agent: \"poweriq\" },\n  { name: \"\
    poweriq_get_readings\", description: \"Get power readings\", agent: \"poweriq\"\
    \ },\n  { name: \"poweriq_list_sensors\", description: \"List environmental sensors\"\
    , agent: \"poweriq\" },\n  { name: \"poweriq_get_sensor_readings\", description:\
    \ \"Get sensor readings\", agent: \"poweriq\" },\n  { name: \"poweriq_list_alerts\"\
    , description: \"List active alerts\", agent: \"poweriq\" },\n  { name: \"poweriq_get_pue\"\
    , description: \"Get PUE data\", agent: \"poweriq\" },\n  { name: \"dcim_get_rack_summary\"\
    , description: \"Get full rack summary with power and thermal\", agent: \"combined\"\
    \ },\n  { name: \"dcim_find_capacity\", description: \"Find available capacity\"\
    , agent: \"combined\" },\n  { name: \"dcim_get_health_status\", description: \"\
    Get overall health status\", agent: \"combined\" }\n];\n\n// HTTP request helper\
    \ for dcTrack\nfunction dctrackRequest(method, path, body = null) {\n  return\
    \ new Promise((resolve, reject) => {\n    console.log(`[dcTrack] ${method} ${path}`);\n\
    \    const options = {\n      hostname: DCTRACK_URL,\n      port: 443,\n     \
    \ path: path,\n      method: method,\n      rejectUnauthorized: false,\n     \
    \ headers: {\n        \"Authorization\": AUTH,\n        \"Content-Type\": \"application/json\"\
    ,\n        \"Accept\": \"application/json\"\n      }\n    };\n\n    const req\
    \ = https.request(options, (res) => {\n      let data = \"\";\n      res.on(\"\
    data\", chunk => data += chunk);\n      res.on(\"end\", () => {\n        console.log(`[dcTrack]\
    \ Response: ${res.statusCode} (${data.length} bytes)`);\n        try {\n     \
    \     // Handle empty response\n          if (!data || data.trim() === \"\") {\n\
    \            resolve({ status: res.statusCode, data: {} });\n            return;\n\
    \          }\n          const parsed = JSON.parse(data);\n          resolve({\
    \ status: res.statusCode, data: parsed });\n        } catch (e) {\n          //\
    \ Return raw data if not JSON\n          console.log(`[dcTrack] Non-JSON response:\
    \ ${data.substring(0, 200)}`);\n          resolve({ status: res.statusCode, data:\
    \ { raw: data } });\n        }\n      });\n    });\n\n    req.on(\"error\", (e)\
    \ => {\n      console.error(`[dcTrack] Error: ${e.message}`);\n      reject(new\
    \ Error(`dcTrack request failed: ${e.message}`));\n    });\n\n    if (body) {\n\
    \      const bodyStr = JSON.stringify(body);\n      console.log(`[dcTrack] Body:\
    \ ${bodyStr.substring(0, 200)}`);\n      req.write(bodyStr);\n    }\n    req.end();\n\
    \  });\n}\n\n// HTTP request helper for Power IQ\nfunction poweriqRequest(method,\
    \ path, body = null) {\n  return new Promise((resolve, reject) => {\n    const\
    \ options = {\n      hostname: POWERIQ_URL,\n      port: 443,\n      path: path,\n\
    \      method: method,\n      rejectUnauthorized: false,\n      headers: {\n \
    \       \"Authorization\": AUTH,\n        \"Content-Type\": \"application/json\"\
    ,\n        \"Accept\": \"application/json\"\n      }\n    };\n\n    const req\
    \ = https.request(options, (res) => {\n      let data = \"\";\n      res.on(\"\
    data\", chunk => data += chunk);\n      res.on(\"end\", () => {\n        try {\n\
    \          if (!data || data.trim() === \"\") {\n            resolve({ status:\
    \ res.statusCode, data: {} });\n            return;\n          }\n          const\
    \ parsed = JSON.parse(data);\n          resolve({ status: res.statusCode, data:\
    \ parsed });\n        } catch (e) {\n          resolve({ status: res.statusCode,\
    \ data: { raw: data } });\n        }\n      });\n    });\n\n    req.on(\"error\"\
    , (e) => {\n      reject(new Error(`Power IQ request failed: ${e.message}`));\n\
    \    });\n\n    if (body) {\n      req.write(JSON.stringify(body));\n    }\n \
    \   req.end();\n  });\n}\n\n// Tool handlers\nconst toolHandlers = {\n  // ====================\
    \ dcTrack Locations ====================\n  dctrack_list_locations: async (args)\
    \ => {\n    const pageSize = args.pageSize || 100;\n    const page = args.page\
    \ || 1;\n    const body = {\n      columns: [\n        { name: \"tiLocationName\"\
    , filter: { contains: args.filter || \"\" } }\n      ],\n      selectedColumns:\
    \ [\n        { name: \"id\" },\n        { name: \"tiLocationName\" },\n      \
    \  { name: \"tiLocationType\" },\n        { name: \"tiLocationArea\" },\n    \
    \    { name: \"tiLocationParent\" }\n      ],\n      pageNumber: page,\n     \
    \ pageSize: pageSize\n    };\n    return await dctrackRequest(\"POST\", \"/api/v2/dcimoperations/locations/quicksearch\"\
    , body);\n  },\n\n  dctrack_get_location: async (args) => {\n    if (!args.id)\
    \ throw new Error(\"Location ID required\");\n    return await dctrackRequest(\"\
    GET\", `/api/v2/dcimoperations/locations/${args.id}`);\n  },\n\n  dctrack_create_location:\
    \ async (args) => {\n    if (!args.name) throw new Error(\"Location name required\"\
    );\n    const body = {\n      tiLocationName: args.name,\n      tiLocationType:\
    \ args.type || \"Room\",\n      tiLocationParent: args.parent || null,\n     \
    \ tiLocationArea: args.area || null\n    };\n    return await dctrackRequest(\"\
    POST\", \"/api/v2/dcimoperations/locations\", body);\n  },\n\n  // ====================\
    \ dcTrack Items ====================\n  dctrack_list_items: async (args) => {\n\
    \    const body = {\n      columns: [],\n      selectedColumns: [\n        { name:\
    \ \"id\" },\n        { name: \"tiName\" },\n        { name: \"tiClass\" },\n \
    \       { name: \"cmbLocation\" },\n        { name: \"cmbCabinet\" },\n      \
    \  { name: \"tiMake\" },\n        { name: \"tiModel\" },\n        { name: \"cmbUPosition\"\
    \ },\n        { name: \"tiSerialNumber\" },\n        { name: \"tiAssetTag\" }\n\
    \      ],\n      pageNumber: args.page || 1,\n      pageSize: args.pageSize ||\
    \ 100\n    };\n    \n    // Add filters if provided\n    if (args.class) {\n \
    \     body.columns.push({ name: \"tiClass\", filter: { eq: args.class } });\n\
    \    }\n    if (args.location) {\n      body.columns.push({ name: \"cmbLocation\"\
    , filter: { contains: args.location } });\n    }\n    if (args.cabinet) {\n  \
    \    body.columns.push({ name: \"cmbCabinet\", filter: { contains: args.cabinet\
    \ } });\n    }\n    if (args.name) {\n      body.columns.push({ name: \"tiName\"\
    , filter: { contains: args.name } });\n    }\n    \n    return await dctrackRequest(\"\
    POST\", \"/api/v2/dcimoperations/items/quicksearch\", body);\n  },\n\n  dctrack_search_items:\
    \ async (args) => {\n    return await toolHandlers.dctrack_list_items(args);\n\
    \  },\n\n  dctrack_get_item: async (args) => {\n    if (!args.id) throw new Error(\"\
    Item ID required\");\n    return await dctrackRequest(\"GET\", `/api/v2/dcimoperations/items/${args.id}`);\n\
    \  },\n\n  dctrack_create_item: async (args) => {\n    if (!args.name) throw new\
    \ Error(\"Item name required\");\n    const body = {\n      tiName: args.name,\n\
    \      tiClass: args.class || \"Device\",\n      cmbLocation: args.location,\n\
    \      cmbCabinet: args.cabinet,\n      cmbMake: args.make,\n      cmbModel: args.model,\n\
    \      cmbUPosition: args.uPosition,\n      tiSerialNumber: args.serialNumber,\n\
    \      tiAssetTag: args.assetTag\n    };\n    // Remove null/undefined fields\n\
    \    Object.keys(body).forEach(key => body[key] == null && delete body[key]);\n\
    \    return await dctrackRequest(\"POST\", \"/api/v2/dcimoperations/items\", body);\n\
    \  },\n\n  dctrack_update_item: async (args) => {\n    if (!args.id) throw new\
    \ Error(\"Item ID required\");\n    return await dctrackRequest(\"PUT\", `/api/v2/dcimoperations/items/${args.id}`,\
    \ args.data || args);\n  },\n\n  dctrack_delete_item: async (args) => {\n    if\
    \ (!args.id) throw new Error(\"Item ID required\");\n    return await dctrackRequest(\"\
    DELETE\", `/api/v2/dcimoperations/items/${args.id}`);\n  },\n\n  // ====================\
    \ dcTrack Cabinets ====================\n  dctrack_list_cabinets: async (args)\
    \ => {\n    const modArgs = { ...args, class: \"Cabinet\" };\n    return await\
    \ toolHandlers.dctrack_list_items(modArgs);\n  },\n\n  dctrack_get_cabinet_capacity:\
    \ async (args) => {\n    if (!args.id && !args.name) throw new Error(\"Cabinet\
    \ ID or name required\");\n    \n    let cabinetId = args.id;\n    if (!cabinetId\
    \ && args.name) {\n      // Search for cabinet by name\n      const searchResult\
    \ = await toolHandlers.dctrack_list_items({ name: args.name, class: \"Cabinet\"\
    \ });\n      if (searchResult.data?.searchResults?.items?.length > 0) {\n    \
    \    cabinetId = searchResult.data.searchResults.items[0].id;\n      } else {\n\
    \        throw new Error(`Cabinet not found: ${args.name}`);\n      }\n    }\n\
    \    \n    return await dctrackRequest(\"GET\", `/api/v2/dcimoperations/items/${cabinetId}/cabinet-space`);\n\
    \  },\n\n  // ==================== dcTrack Models ====================\n  dctrack_list_models:\
    \ async (args) => {\n    const body = {\n      columns: [],\n      selectedColumns:\
    \ [\n        { name: \"id\" },\n        { name: \"cmbMake\" },\n        { name:\
    \ \"tiModel\" },\n        { name: \"tiClass\" },\n        { name: \"tiUHeight\"\
    \ },\n        { name: \"tiWeight\" },\n        { name: \"tiPowerBudget\" }\n \
    \     ],\n      pageNumber: args.page || 1,\n      pageSize: args.pageSize ||\
    \ 100\n    };\n    \n    if (args.make) {\n      body.columns.push({ name: \"\
    cmbMake\", filter: { contains: args.make } });\n    }\n    if (args.class) {\n\
    \      body.columns.push({ name: \"tiClass\", filter: { eq: args.class } });\n\
    \    }\n    \n    return await dctrackRequest(\"POST\", \"/api/v2/dcimoperations/models/quicksearch\"\
    , body);\n  },\n\n  dctrack_get_model: async (args) => {\n    if (!args.id) throw\
    \ new Error(\"Model ID required\");\n    return await dctrackRequest(\"GET\",\
    \ `/api/v2/dcimoperations/models/${args.id}`);\n  },\n\n  // ====================\
    \ dcTrack Ports & Connections ====================\n  dctrack_list_power_ports:\
    \ async (args) => {\n    if (!args.itemId) throw new Error(\"Item ID required\"\
    );\n    return await dctrackRequest(\"GET\", `/api/v2/dcimoperations/items/${args.itemId}/powerports`);\n\
    \  },\n\n  dctrack_list_data_ports: async (args) => {\n    if (!args.itemId) throw\
    \ new Error(\"Item ID required\");\n    return await dctrackRequest(\"GET\", `/api/v2/dcimoperations/items/${args.itemId}/dataports`);\n\
    \  },\n\n  dctrack_create_power_connection: async (args) => {\n    if (!args.sourcePortId\
    \ || !args.destPortId) throw new Error(\"Source and destination port IDs required\"\
    );\n    const body = {\n      sourcePortId: args.sourcePortId,\n      destinationPortId:\
    \ args.destPortId,\n      cableColor: args.cableColor || \"Black\"\n    };\n \
    \   return await dctrackRequest(\"POST\", \"/api/v2/dcimoperations/connections/power\"\
    , body);\n  },\n\n  dctrack_create_data_connection: async (args) => {\n    if\
    \ (!args.sourcePortId || !args.destPortId) throw new Error(\"Source and destination\
    \ port IDs required\");\n    const body = {\n      sourcePortId: args.sourcePortId,\n\
    \      destinationPortId: args.destPortId,\n      mediaType: args.mediaType ||\
    \ \"CAT6\",\n      cableColor: args.cableColor || \"Blue\"\n    };\n    return\
    \ await dctrackRequest(\"POST\", \"/api/v2/dcimoperations/connections/data\",\
    \ body);\n  },\n\n  // ==================== Power IQ ====================\n  poweriq_list_pdus:\
    \ async (args) => {\n    return await poweriqRequest(\"GET\", \"/api/v2/pdus\"\
    );\n  },\n\n  poweriq_get_pdu: async (args) => {\n    if (!args.id) throw new\
    \ Error(\"PDU ID required\");\n    return await poweriqRequest(\"GET\", `/api/v2/pdus/${args.id}`);\n\
    \  },\n\n  poweriq_list_outlets: async (args) => {\n    if (!args.pduId) throw\
    \ new Error(\"PDU ID required\");\n    return await poweriqRequest(\"GET\", `/api/v2/pdus/${args.pduId}/outlets`);\n\
    \  },\n\n  poweriq_get_readings: async (args) => {\n    const path = args.pduId\
    \ \n      ? `/api/v2/pdus/${args.pduId}/readings` \n      : \"/api/v2/readings/active_power\"\
    ;\n    return await poweriqRequest(\"GET\", path);\n  },\n\n  poweriq_list_sensors:\
    \ async (args) => {\n    return await poweriqRequest(\"GET\", \"/api/v2/sensors\"\
    );\n  },\n\n  poweriq_get_sensor_readings: async (args) => {\n    if (!args.sensorId)\
    \ throw new Error(\"Sensor ID required\");\n    return await poweriqRequest(\"\
    GET\", `/api/v2/sensors/${args.sensorId}/readings`);\n  },\n\n  poweriq_list_alerts:\
    \ async (args) => {\n    const severity = args.severity ? `?severity=${args.severity}`\
    \ : \"\";\n    return await poweriqRequest(\"GET\", `/api/v2/alerts/active${severity}`);\n\
    \  },\n\n  poweriq_get_pue: async (args) => {\n    return await poweriqRequest(\"\
    GET\", \"/api/v2/pue\");\n  },\n\n  // ==================== Combined/DCIM Tools\
    \ ====================\n  dcim_get_rack_summary: async (args) => {\n    if (!args.cabinetId\
    \ && !args.cabinetName) throw new Error(\"Cabinet ID or name required\");\n  \
    \  \n    let cabinetId = args.cabinetId;\n    if (!cabinetId && args.cabinetName)\
    \ {\n      const searchResult = await toolHandlers.dctrack_list_items({ name:\
    \ args.cabinetName, class: \"Cabinet\" });\n      if (searchResult.data?.searchResults?.items?.length\
    \ > 0) {\n        cabinetId = searchResult.data.searchResults.items[0].id;\n \
    \     } else {\n        throw new Error(`Cabinet not found: ${args.cabinetName}`);\n\
    \      }\n    }\n    \n    const [itemDetails, capacity, items] = await Promise.all([\n\
    \      dctrackRequest(\"GET\", `/api/v2/dcimoperations/items/${cabinetId}`),\n\
    \      dctrackRequest(\"GET\", `/api/v2/dcimoperations/items/${cabinetId}/cabinet-space`),\n\
    \      toolHandlers.dctrack_list_items({ cabinet: args.cabinetName || cabinetId.toString()\
    \ })\n    ]);\n    \n    return {\n      status: 200,\n      data: {\n       \
    \ cabinet: itemDetails.data,\n        capacity: capacity.data,\n        items:\
    \ items.data?.searchResults?.items || []\n      }\n    };\n  },\n\n  dcim_find_capacity:\
    \ async (args) => {\n    const requiredU = args.requiredU || 1;\n    const requiredPower\
    \ = args.requiredPowerKw || 0;\n    \n    const cabinets = await toolHandlers.dctrack_list_cabinets({\
    \ pageSize: 500 });\n    const availableCabinets = [];\n    \n    for (const cabinet\
    \ of (cabinets.data?.searchResults?.items || []).slice(0, 20)) {\n      try {\n\
    \        const capacity = await dctrackRequest(\"GET\", `/api/v2/dcimoperations/items/${cabinet.id}/cabinet-space`);\n\
    \        const availableU = capacity.data?.availableUs || 0;\n        if (availableU\
    \ >= requiredU) {\n          availableCabinets.push({\n            id: cabinet.id,\n\
    \            name: cabinet.tiName,\n            location: cabinet.cmbLocation,\n\
    \            availableU: availableU,\n            totalU: capacity.data?.totalUs\
    \ || 42\n          });\n        }\n      } catch (e) {\n        // Skip cabinets\
    \ we can't get capacity for\n      }\n    }\n    \n    return {\n      status:\
    \ 200,\n      data: {\n        requiredU,\n        requiredPowerKw: requiredPower,\n\
    \        availableCabinets: availableCabinets.sort((a, b) => b.availableU - a.availableU)\n\
    \      }\n    };\n  },\n\n  dcim_get_health_status: async (args) => {\n    const\
    \ [alerts, pue] = await Promise.all([\n      poweriqRequest(\"GET\", \"/api/v2/alerts/active\"\
    ).catch(() => ({ data: { alerts: [] } })),\n      poweriqRequest(\"GET\", \"/api/v2/pue\"\
    ).catch(() => ({ data: {} }))\n    ]);\n    \n    return {\n      status: 200,\n\
    \      data: {\n        activeAlerts: alerts.data?.alerts?.length || 0,\n    \
    \    criticalAlerts: (alerts.data?.alerts || []).filter(a => a.severity === \"\
    critical\").length,\n        pue: pue.data?.current_pue || null,\n        status:\
    \ (alerts.data?.alerts || []).some(a => a.severity === \"critical\") ? \"critical\"\
    \ : \"healthy\"\n      }\n    };\n  }\n};\n\n// Create HTTP server\nconst server\
    \ = http.createServer(async (req, res) => {\n  // Set CORS headers\n  res.setHeader(\"\
    Access-Control-Allow-Origin\", \"*\");\n  res.setHeader(\"Access-Control-Allow-Methods\"\
    , \"GET, POST, OPTIONS\");\n  res.setHeader(\"Access-Control-Allow-Headers\",\
    \ \"Content-Type, Authorization\");\n  res.setHeader(\"Content-Type\", \"application/json\"\
    );\n\n  // Handle preflight\n  if (req.method === \"OPTIONS\") {\n    res.writeHead(204);\n\
    \    res.end();\n    return;\n  }\n\n  // CRITICAL FIX: Normalize URL - remove\
    \ trailing slash and handle case\n  let url = req.url || \"/\";\n  url = url.split(\"\
    ?\")[0]; // Remove query string\n  url = url.replace(/\\/+$/, \"\") || \"/\";\
    \ // Remove trailing slashes\n\n  console.log(`[${new Date().toISOString()}] ${req.method}\
    \ ${url}`);\n\n  // Health check\n  if (url === \"/health\" && req.method ===\
    \ \"GET\") {\n    res.end(JSON.stringify({ status: \"healthy\", tools: TOOLS.length,\
    \ timestamp: new Date().toISOString() }));\n    return;\n  }\n\n  // List tools\n\
    \  if (url === \"/tools\" && req.method === \"GET\") {\n    res.end(JSON.stringify({\
    \ tools: TOOLS }));\n    return;\n  }\n\n  // Object types reference\n  if (url\
    \ === \"/object-types\" && req.method === \"GET\") {\n    res.end(JSON.stringify({\n\
    \      itemClasses: [\"Device\", \"Network\", \"Data Panel\", \"Cabinet\", \"\
    Rack PDU\", \"Floor PDU\", \"UPS\", \"CRAC\", \"Probe\", \"Passive\"],\n     \
    \ locationTypes: [\"Site\", \"Building\", \"Floor\", \"Room\", \"Zone\"],\n  \
    \    connectionTypes: [\"Power\", \"Data\"]\n    }));\n    return;\n  }\n\n  //\
    \ Direct tool invocation: POST /tools/{toolName} or POST /tool/{toolName}\n  const\
    \ toolMatch = url.match(/^\\/tools?\\/([a-zA-Z0-9_]+)$/);\n  if (toolMatch &&\
    \ req.method === \"POST\") {\n    const toolName = toolMatch[1];\n    let body\
    \ = \"\";\n    \n    req.on(\"data\", chunk => body += chunk);\n    req.on(\"\
    end\", async () => {\n      try {\n        const args = body ? JSON.parse(body)\
    \ : {};\n        \n        if (toolHandlers[toolName]) {\n          try {\n  \
    \          const result = await toolHandlers[toolName](args);\n            res.writeHead(result.status\
    \ || 200);\n            res.end(JSON.stringify(result.data));\n          } catch\
    \ (err) {\n            console.error(`Tool error [${toolName}]:`, err.message);\n\
    \            res.writeHead(500);\n            res.end(JSON.stringify({ error:\
    \ err.message }));\n          }\n        } else {\n          res.writeHead(404);\n\
    \          res.end(JSON.stringify({ error: `Tool not found: ${toolName}`, availableTools:\
    \ TOOLS.map(t => t.name) }));\n        }\n      } catch (e) {\n        res.writeHead(400);\n\
    \        res.end(JSON.stringify({ error: \"Invalid JSON body\" }));\n      }\n\
    \    });\n    return;\n  }\n\n  // MCP JSON-RPC endpoint\n  if (url === \"/mcp\"\
    \ && req.method === \"POST\") {\n    let body = \"\";\n    req.on(\"data\", chunk\
    \ => body += chunk);\n    req.on(\"end\", async () => {\n      try {\n       \
    \ const request = JSON.parse(body);\n        \n        // Handle tools/list\n\
    \        if (request.method === \"tools/list\") {\n          res.end(JSON.stringify({\n\
