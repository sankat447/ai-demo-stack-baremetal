apiVersion: v1
kind: Service
metadata:
  annotations:
    description: Headless service for direct pod access
  labels:
    app: sunbird-mcp-server
    app.kubernetes.io/component: mcp-server
    app.kubernetes.io/name: sunbird-mcp-server
    app.kubernetes.io/part-of: dcim-integration
    environment: production
  name: sunbird-mcp-server-headless
spec:
  ports:
  - name: http
    port: 8080
    protocol: TCP
    targetPort: 8080
  selector:
    app: sunbird-mcp-server
  sessionAffinity: None
  type: ClusterIP
