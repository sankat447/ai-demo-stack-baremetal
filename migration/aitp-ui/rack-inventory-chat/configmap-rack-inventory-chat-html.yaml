apiVersion: v1
data:
  index.html: "<!DOCTYPE html>\n<html lang=\"en\">\n<head>\n<meta charset=\"UTF-8\"\
    />\n<meta name=\"viewport\" content=\"width=device-width, initial-scale=1.0\"\
    />\n<title>IIS Tech &#8211; Rack Discovery AI</title>\n<link href=\"https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap\"\
    \ rel=\"stylesheet\"/>\n<style>\n:root {\n  --bg:        #09111e;\n  --surface:\
    \   #0e1d2f;\n  --surface2:  #152438;\n  --border:    #1e3352;\n  --border2: \
    \  #2a4a70;\n  --accent:    #00aaff;\n  --accent2:   #0066cc;\n  --accentglo:\
    \ rgba(0,170,255,.18);\n  --green:     #00e5a0;\n  --amber:     #ffb300;\n  --red:\
    \       #ff4d6a;\n  --text:      #cde4f8;\n  --text2:     #7a9fbe;\n  --text3:\
    \     #3d6284;\n  --mono:      'IBM Plex Mono', monospace;\n  --head:      'Syne',\
    \ sans-serif;\n  --body:      'DM Sans', sans-serif;\n}\n*, *::before, *::after\
    \ { box-sizing: border-box; margin: 0; padding: 0; }\nhtml, body { height: 100%;\
    \ overflow: hidden; }\nbody {\n  font-family: var(--body);\n  background: var(--bg);\n\
    \  color: var(--text);\n  display: flex;\n  flex-direction: column;\n  height:\
    \ 100dvh;\n}\nbody::before {\n  content:'';\n  position:fixed; inset:0;\n  background-image:\
    \ repeating-linear-gradient(0deg,rgba(0,0,0,.15) 0px,rgba(0,0,0,.15) 1px,transparent\
    \ 1px,transparent 3px);\n  pointer-events:none; z-index:999; opacity:.35;\n}\n\
    \n/* \u2500\u2500 Header \u2500\u2500 */\nheader {\n  display:flex; align-items:center;\
    \ gap:16px;\n  padding:12px 24px; flex-shrink:0;\n  background: linear-gradient(90deg,#050d18,#0a1828\
    \ 60%,#070f1a);\n  border-bottom: 1px solid var(--border);\n  position:relative;\
    \ z-index:10;\n}\nheader::after {\n  content:''; position:absolute; bottom:0;\
    \ left:0; right:0; height:1px;\n  background: linear-gradient(90deg,transparent,var(--accent),transparent);\
    \ opacity:.35;\n}\n.logo-wrap { display:flex; align-items:center; gap:10px; text-decoration:none;\
    \ }\n.logo-icon {\n  width:36px; height:36px; border-radius:9px;\n  background:\
    \ linear-gradient(135deg,var(--accent2),var(--accent));\n  display:grid; place-items:center;\
    \ font-size:17px;\n  box-shadow: 0 0 14px var(--accentglo);\n}\n.logo-text { font-family:var(--head);\
    \ font-weight:800; font-size:.95rem; color:#fff; line-height:1.1; }\n.logo-sub\
    \  { font-family:var(--mono); font-size:.58rem; color:var(--text2); letter-spacing:.08em;\
    \ }\n.hdivider  { width:1px; height:26px; background:var(--border2); margin:0\
    \ 4px; }\n.app-name  { font-family:var(--head); font-weight:700; font-size:.9rem;\
    \ color:var(--text); }\n.app-tag   { font-family:var(--mono); font-size:.56rem;\
    \ color:var(--accent); letter-spacing:.1em; text-transform:uppercase; display:block;\
    \ margin-top:2px; }\n.hstatus   { margin-left:auto; display:flex; align-items:center;\
    \ gap:7px; font-family:var(--mono); font-size:.65rem; color:var(--text2); }\n\
    .dot { width:6px; height:6px; border-radius:50%; background:var(--green); box-shadow:0\
    \ 0 7px var(--green); animation:pulse 2s infinite; }\n@keyframes pulse { 0%,100%{opacity:1}\
    \ 50%{opacity:.35} }\n\n/* \u2500\u2500 Stepper \u2500\u2500 */\n.stepper {\n\
    \  display:flex; align-items:center; justify-content:center;\n  padding:10px 20px;\
    \ gap:0; flex-shrink:0;\n  background:var(--surface); border-bottom:1px solid\
    \ var(--border);\n}\n.step {\n  display:flex; align-items:center; gap:7px; padding:0\
    \ 10px;\n  font-family:var(--mono); font-size:.62rem; color:var(--text3); transition:color\
    \ .3s;\n}\n.step::after { content:'----'; color:var(--border2); font-size:.5rem;\
    \ letter-spacing:-.05em; }\n.step:last-child::after { content:''; }\n.step-num\
    \ {\n  width:22px; height:22px; border-radius:50%;\n  border:1.5px solid var(--border2);\n\
    \  display:grid; place-items:center;\n  font-size:.65rem; font-weight:600;\n \
    \ transition:all .3s; background:var(--bg); flex-shrink:0;\n}\n.step.active {\
    \ color:var(--text); }\n.step.active .step-num { border-color:var(--accent); color:var(--accent);\
    \ background:var(--accentglo); box-shadow:0 0 10px var(--accentglo); }\n.step.done\
    \   { color:var(--green); }\n.step.done .step-num { border-color:var(--green);\
    \ color:var(--green); background:rgba(0,229,160,.1); }\n.slabel { display:none;\
    \ }\n@media(min-width:560px){ .slabel { display:inline; } }\n\n/* \u2500\u2500\
    \ Two-panel layout \u2500\u2500 */\n.workspace {\n  display:flex; flex:1; overflow:hidden;\
    \ min-height:0;\n}\n\n/* \u2500\u2500 LEFT: Chat panel \u2500\u2500 */\n.panel-left\
    \ {\n  display:flex; flex-direction:column;\n  width:400px; min-width:320px; max-width:420px;\
    \ flex-shrink:0;\n  border-right:1px solid var(--border);\n  background:var(--bg);\n\
    \  position:relative;\n}\n.panel-left::before {\n  content:''; position:absolute;\
    \ inset:0;\n  background-image: linear-gradient(var(--border) 1px,transparent\
    \ 1px), linear-gradient(90deg,var(--border) 1px,transparent 1px);\n  background-size:48px\
    \ 48px; opacity:.08; pointer-events:none;\n}\n#messages {\n  flex:1; overflow-y:auto;\
    \ padding:16px 14px;\n  display:flex; flex-direction:column; gap:14px;\n  position:relative;\
    \ z-index:1; scroll-behavior:smooth;\n}\n#messages::-webkit-scrollbar { width:3px;\
    \ }\n#messages::-webkit-scrollbar-thumb { background:var(--border2); border-radius:3px;\
    \ }\n\n/* \u2500\u2500 RIGHT: Data panel \u2500\u2500 */\n.panel-right {\n  flex:1;\
    \ overflow-y:auto; display:flex; flex-direction:column;\n  background: linear-gradient(160deg,#090f1b\
    \ 0%,#0a1525 100%);\n  position:relative;\n}\n.panel-right::-webkit-scrollbar\
    \ { width:4px; }\n.panel-right::-webkit-scrollbar-thumb { background:var(--border2);\
    \ border-radius:4px; }\n.panel-right::before {\n  content:''; position:absolute;\
    \ inset:0;\n  background-image: linear-gradient(var(--border) 1px,transparent\
    \ 1px), linear-gradient(90deg,var(--border) 1px,transparent 1px);\n  background-size:48px\
    \ 48px; opacity:.07; pointer-events:none;\n}\n#right-content {\n  flex:1; padding:20px\
    \ 24px;\n  display:flex; flex-direction:column; gap:20px;\n  position:relative;\
    \ z-index:1;\n}\n\n/* Empty state for right panel */\n.right-empty {\n  flex:1;\
    \ display:flex; flex-direction:column;\n  align-items:center; justify-content:center;\
    \ gap:16px;\n  color:var(--text3); text-align:center; padding:40px;\n}\n.right-empty-icon\
    \ { font-size:3rem; opacity:.4; }\n.right-empty-title { font-family:var(--head);\
    \ font-size:1.1rem; font-weight:700; color:var(--text2); }\n.right-empty-sub {\
    \ font-family:var(--mono); font-size:.7rem; line-height:1.8; }\n\n/* Right panel\
    \ section labels */\n.rpanel-label {\n  font-family:var(--mono); font-size:.62rem;\
    \ color:var(--accent);\n  letter-spacing:.12em; text-transform:uppercase;\n  display:flex;\
    \ align-items:center; gap:8px; margin-bottom:10px;\n}\n.rpanel-label::after {\n\
    \  content:''; flex:1; height:1px; background:var(--border2); opacity:.5;\n}\n\
    \n/* Image in right panel */\n.right-image-wrap {\n  border-radius:10px; overflow:hidden;\n\
    \  border:1px solid var(--border2);\n  background:var(--surface2);\n  position:relative;\n\
    }\n.right-image-wrap img {\n  width:100%; display:block;\n  object-fit:contain;\
    \ /* maintains aspect ratio */\n  max-height:420px;\n  background:#000;\n}\n.right-image-meta\
    \ {\n  padding:8px 12px;\n  display:flex; justify-content:space-between; align-items:center;\n\
    \  border-top:1px solid var(--border);\n  font-family:var(--mono); font-size:.65rem;\
    \ color:var(--text2);\n}\n\n/* Table in right panel */\n.tbl-wrap { overflow-x:auto;\
    \ border-radius:10px; border:1px solid var(--border2); }\n.tbl-wrap::-webkit-scrollbar\
    \ { height:4px; }\n.tbl-wrap::-webkit-scrollbar-thumb { background:var(--border2);\
    \ border-radius:4px; }\ntable { width:100%; border-collapse:collapse; font-size:.77rem;\
    \ }\nthead { background:rgba(0,170,255,.07); }\nth {\n  padding:9px 11px; text-align:left;\n\
    \  font-family:var(--mono); font-size:.6rem; color:var(--accent);\n  letter-spacing:.06em;\
    \ text-transform:uppercase;\n  border-bottom:1px solid var(--border2); white-space:nowrap;\n\
    }\ntd { padding:7px 11px; border-bottom:1px solid var(--border); vertical-align:middle;\
    \ }\ntr:last-child td { border-bottom:none; }\ntr:hover td { background:rgba(0,170,255,.04);\
    \ }\ntd input, td select {\n  background:transparent; border:none; outline:none;\n\
    \  color:var(--text); width:100%; font:inherit; font-size:.77rem;\n  padding:2px\
    \ 3px; border-radius:4px; transition:background .2s;\n}\ntd input:focus, td select:focus\
    \ { background:rgba(0,170,255,.1); box-shadow:0 0 0 1px var(--accent); }\ntd select\
    \ option { background:var(--surface2); color:var(--text); }\n.c-hi  { color:var(--green);\
    \ font-family:var(--mono); font-size:.65rem; }\n.c-med { color:var(--amber); font-family:var(--mono);\
    \ font-size:.65rem; }\n.c-lo  { color:var(--red);   font-family:var(--mono); font-size:.65rem;\
    \ }\n\n/* \u2500\u2500 Chat messages \u2500\u2500 */\n.msg { display:flex; gap:9px;\
    \ animation:slideup .3s ease both; }\n.msg.user { flex-direction:row-reverse;\
    \ }\n@keyframes slideup { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:none}\
    \ }\n.avatar {\n  width:28px; height:28px; flex-shrink:0; border-radius:8px;\n\
    \  display:grid; place-items:center; font-size:13px;\n}\n.msg.bot  .avatar { background:linear-gradient(135deg,var(--accent2),var(--accent));\
    \ box-shadow:0 0 8px var(--accentglo); }\n.msg.user .avatar { background:var(--surface2);\
    \ border:1px solid var(--border2); }\n.bubble {\n  flex:1; min-width:0;\n  background:var(--surface);\
    \ border:1px solid var(--border);\n  border-radius:0 11px 11px 11px;\n  padding:10px\
    \ 13px; line-height:1.65; font-size:.84rem;\n}\n.msg.user .bubble { background:var(--surface2);\
    \ border-color:var(--border2); border-radius:11px 0 11px 11px; }\n.bubble.glow\
    \ { border-color:var(--accent); box-shadow:0 0 16px rgba(0,170,255,.09); }\n.sender\
    \ { font-family:var(--mono); font-size:.58rem; color:var(--text2); margin-bottom:5px;\
    \ letter-spacing:.05em; }\n.msg.user .sender { text-align:right; }\n\n/* Right-panel\
    \ pointer bubble (for events that go to right panel) */\n.bubble-pointer {\n \
    \ background:rgba(0,170,255,.04); border:1px dashed var(--border2);\n  border-radius:8px;\
    \ padding:8px 11px;\n  font-family:var(--mono); font-size:.68rem; color:var(--text3);\n\
    \  display:flex; align-items:center; gap:7px;\n}\n.bubble-pointer .arrow { color:var(--accent);\
    \ }\n\n/* Forms */\n.fgroup  { display:flex; flex-direction:column; gap:6px; margin-top:12px;\
    \ }\n.flabel  { font-family:var(--mono); font-size:.65rem; color:var(--text2);\
    \ letter-spacing:.05em; }\n.finput, .fselect {\n  background:var(--surface2);\
    \ border:1px solid var(--border2); border-radius:8px;\n  padding:8px 12px; color:var(--text);\
    \ font:inherit; font-size:.84rem;\n  outline:none; transition:border-color .2s,\
    \ box-shadow .2s; width:100%;\n}\n.finput:focus, .fselect:focus { border-color:var(--accent);\
    \ box-shadow:0 0 0 3px var(--accentglo); }\n.fselect option { background:var(--surface2);\
    \ color:var(--text); }\n\n/* Buttons */\n.btn {\n  padding:8px 18px; border:none;\
    \ border-radius:8px;\n  font-family:var(--head); font-weight:700; font-size:.8rem;\n\
    \  cursor:pointer; transition:all .2s;\n  display:inline-flex; align-items:center;\
    \ gap:7px;\n}\n.btn-primary {\n  background:linear-gradient(135deg,var(--accent2),var(--accent));\n\
    \  color:#fff; box-shadow:0 4px 14px rgba(0,170,255,.3);\n}\n.btn-primary:hover\
    \ { box-shadow:0 6px 22px rgba(0,170,255,.5); transform:translateY(-1px); }\n\
    .btn-ghost { background:transparent; color:var(--text2); border:1px solid var(--border2);\
    \ }\n.btn-ghost:hover { border-color:var(--accent); color:var(--accent); }\n.btn:disabled\
    \ { opacity:.4; cursor:not-allowed; transform:none !important; }\n.abar { display:flex;\
    \ gap:8px; margin-top:12px; flex-wrap:wrap; justify-content:flex-end; }\n\n/*\
    \ Thinking */\n.thinking { display:flex; align-items:center; gap:9px; color:var(--text2);\
    \ font-family:var(--mono); font-size:.72rem; }\n.tdots span { display:inline-block;\
    \ width:5px; height:5px; background:var(--accent); border-radius:50%; animation:bounce\
    \ .8s ease-in-out infinite; margin:0 2px; }\n.tdots span:nth-child(2){ animation-delay:.15s;\
    \ }\n.tdots span:nth-child(3){ animation-delay:.3s; }\n@keyframes bounce { 0%,80%,100%{transform:scale(.6)}\
    \ 40%{transform:scale(1)} }\n\n/* Result card */\n.rcard { background:rgba(0,229,160,.04);\
    \ border:1px solid rgba(0,229,160,.2); border-radius:11px; padding:16px; }\n.rcard\
    \ h4 { font-family:var(--head); color:var(--green); font-size:.9rem; margin-bottom:10px;\
    \ }\n.rstat { display:flex; justify-content:space-between; align-items:center;\
    \ padding:6px 0; border-bottom:1px solid rgba(255,255,255,.05); font-size:.82rem;\
    \ }\n.rstat:last-child { border-bottom:none; }\n.rval { font-family:var(--mono);\
    \ font-size:.75rem; color:var(--accent); }\n\n/* Error box */\n.errbox { background:rgba(255,77,106,.06);\
    \ border:1px solid rgba(255,77,106,.25); border-radius:9px; padding:10px 14px;\
    \ font-size:.8rem; color:var(--red); font-family:var(--mono); }\n\n/* Upload zone\
    \ */\n.upzone {\n  border:2px dashed var(--border2); border-radius:10px;\n  padding:24px\
    \ 16px; text-align:center; cursor:pointer;\n  transition:all .25s; background:rgba(0,170,255,.02);\
    \ margin-top:10px;\n  position:relative; overflow:hidden;\n}\n.upzone:hover {\
    \ border-color:var(--accent); background:var(--accentglo); }\n.upzone.drag  {\
    \ border-color:var(--accent); background:var(--accentglo); }\n.upzone-icon  {\
    \ font-size:2rem; display:block; margin-bottom:7px; }\n.upzone-title { font-family:var(--head);\
    \ font-weight:700; font-size:.88rem; color:var(--text); }\n.upzone-sub   { font-size:.74rem;\
    \ color:var(--text2); margin-top:3px; }\n\n/* Footer / chat input */\n.chat-footer\
    \ {\n  border-top:1px solid var(--border); background:var(--surface);\n  padding:10px\
    \ 14px; display:flex; align-items:flex-end; gap:8px; flex-shrink:0;\n}\n#userinput\
    \ {\n  flex:1; background:var(--surface2); border:1px solid var(--border2);\n\
    \  border-radius:9px; padding:8px 12px;\n  color:var(--text); font:inherit; font-size:.84rem;\n\
    \  outline:none; resize:none; max-height:80px; transition:border-color .2s;\n\
    }\n#userinput:focus { border-color:var(--accent); }\n#userinput::placeholder {\
    \ color:var(--text3); }\n#sendbtn {\n  background:linear-gradient(135deg,var(--accent2),var(--accent));\n\
    \  border:none; border-radius:9px; width:38px; height:38px;\n  display:grid; place-items:center;\
    \ cursor:pointer; font-size:15px;\n  box-shadow:0 0 10px rgba(0,170,255,.3); transition:all\
    \ .2s; flex-shrink:0; color:#fff;\n}\n#sendbtn:hover { transform:scale(1.08);\
    \ box-shadow:0 0 18px rgba(0,170,255,.5); }\n\n/* Right panel header bar */\n\
    .right-header {\n  padding:14px 24px 0;\n  display:flex; align-items:center; justify-content:space-between;\n\
    \  flex-shrink:0;\n}\n.right-header-title {\n  font-family:var(--mono); font-size:.65rem;\
    \ color:var(--text3);\n  letter-spacing:.1em; text-transform:uppercase;\n}\n.right-header-badge\
    \ {\n  font-family:var(--mono); font-size:.6rem;\n  background:var(--accentglo);\
    \ border:1px solid var(--border2);\n  color:var(--accent); padding:2px 8px; border-radius:20px;\n\
    }\n\n/* Item results list */\n.item-row {\n  padding:7px 0; border-bottom:1px\
    \ solid rgba(255,255,255,.05);\n  display:flex; flex-direction:column; gap:3px;\n\
    }\n.item-row:last-child { border-bottom:none; }\n.item-row-top { display:flex;\
    \ justify-content:space-between; align-items:center; font-size:.82rem; }\n.item-err-detail\
    \ { font-family:var(--mono); font-size:.62rem; color:var(--amber); word-break:break-all;\
    \ white-space:pre-wrap; opacity:.85; }\n\n@media(max-width:768px) {\n  .workspace\
    \ { flex-direction:column; }\n  .panel-left { width:100%; max-width:100%; border-right:none;\
    \ border-bottom:1px solid var(--border); height:50%; }\n  .panel-right { height:50%;\
    \ }\n}\n</style>\n</head>\n<body>\n\n<header>\n  <a href=\"https://www.iistech.com/\"\
    \ target=\"_blank\" class=\"logo-wrap\">\n    <div class=\"logo-icon\">&#9889;</div>\n\
    \    <div>\n      <div class=\"logo-text\">IIS Technologies</div>\n      <div\
    \ class=\"logo-sub\">iistech.com</div>\n    </div>\n  </a>\n  <div class=\"hdivider\"\
    ></div>\n  <div>\n    <div class=\"app-name\">Rack Discovery AI</div>\n    <span\
    \ class=\"app-tag\">Claude Vision + Sunbird dcTrack</span>\n  </div>\n  <div class=\"\
    hstatus\">\n    <div class=\"dot\"></div>\n    <span>Connected</span>\n  </div>\n\
    </header>\n\n<div class=\"stepper\">\n  <div class=\"step active\" id=\"s1\"><div\
    \ class=\"step-num\">1</div><span class=\"slabel\">Upload</span></div>\n  <div\
    \ class=\"step\" id=\"s2\"><div class=\"step-num\">2</div><span class=\"slabel\"\
    >Review</span></div>\n  <div class=\"step\" id=\"s3\"><div class=\"step-num\"\
    >3</div><span class=\"slabel\">Location</span></div>\n  <div class=\"step\" id=\"\
    s4\"><div class=\"step-num\">4</div><span class=\"slabel\">Push</span></div>\n\
    </div>\n\n<div class=\"workspace\">\n\n  <!-- LEFT: Chat -->\n  <div class=\"\
    panel-left\">\n    <div id=\"messages\"></div>\n    <div class=\"chat-footer\"\
    >\n      <textarea id=\"userinput\" rows=\"1\" placeholder=\"Type a message...\"\
    ></textarea>\n      <button id=\"sendbtn\" title=\"Send\">&#10148;</button>\n\
    \    </div>\n  </div>\n\n  <!-- RIGHT: Visual data panel -->\n  <div class=\"\
    panel-right\">\n    <div class=\"right-header\">\n      <span class=\"right-header-title\"\
    >Visual Data Panel</span>\n      <span class=\"right-header-badge\" id=\"right-badge\"\
    >Awaiting upload</span>\n    </div>\n    <div id=\"right-content\">\n      <!--\
    \ Empty state -->\n      <div class=\"right-empty\" id=\"right-empty\">\n    \
    \    <div class=\"right-empty-icon\">\U0001F5A5\uFE0F</div>\n        <div class=\"\
    right-empty-title\">Nothing here yet</div>\n        <div class=\"right-empty-sub\"\
    >\n          Upload a rack photo on the left<br/>\n          Your image, inventory\
    \ table<br/>and push results will appear here\n        </div>\n      </div>\n\
    \    </div>\n  </div>\n\n</div>\n\n<script>\n'use strict';\n\nvar WEBHOOK    \
    \  = 'https://workflows.apps.ocp419.crucible.iisl.com/webhook/rack-to-dctrack';\n\
    var DCTRACK_CHAT = 'https://workflows.apps.ocp419.crucible.iisl.com/webhook/dctrack-chat/chat/completions';\n\
    \nvar APP = {\n  step: 1,\n  b64: null,\n  mime: null,\n  inventory: [],\n  locations:\
    \ [],\n  cabinet: '',\n  location: '',\n  session: 'sess_' + Date.now()\n};\n\n\
    /* \u2500\u2500\u2500 Stepper \u2500\u2500\u2500 */\nfunction setStep(n) {\n \
    \ APP.step = n;\n  for (var i = 1; i <= 4; i++) {\n    var el = document.getElementById('s'\
    \ + i);\n    if (!el) continue;\n    if (i < n)        el.className = 'step done';\n\
    \    else if (i === n) el.className = 'step active';\n    else              el.className\
    \ = 'step';\n  }\n}\n\n/* \u2500\u2500\u2500 Left chat helpers \u2500\u2500\u2500\
    \ */\nvar msgsEl = document.getElementById('messages');\n\nfunction addMsg(role,\
    \ html, glow) {\n  var wrap = document.createElement('div');\n  wrap.className\
    \ = 'msg ' + (role === 'user' ? 'user' : 'bot');\n\n  var av = document.createElement('div');\n\
    \  av.className = 'avatar';\n  av.textContent = role === 'user' ? '\\uD83D\\uDC64'\
    \ : '\\u26A1';\n\n  var bub = document.createElement('div');\n  bub.className\
    \ = glow ? 'bubble glow' : 'bubble';\n\n  var sndr = document.createElement('div');\n\
    \  sndr.className = 'sender';\n  sndr.textContent = role === 'user' ? 'YOU' :\
    \ 'IIS RACK AI';\n\n  var body = document.createElement('div');\n  body.innerHTML\
