apiVersion: v1
data:
  default.conf: "server {\n    listen 8080;\n    server_name _;\n\n    # Serve static\
    \ files\n    location / {\n        root /usr/share/nginx/html;\n        index\
    \ index.html;\n        try_files $uri $uri/ /index.html;\n    }\n\n    # Proxy\
    \ API requests to n8n workflow\n    location /api/ {\n        proxy_pass https://workflows.apps.ocp419.crucible.iisl.com/webhook/dctrack-chat/;\n\
    \        proxy_http_version 1.1;\n        proxy_set_header Host workflows.apps.ocp419.crucible.iisl.com;\n\
    \        proxy_set_header X-Real-IP $remote_addr;\n        proxy_set_header X-Forwarded-For\
    \ $proxy_add_x_forwarded_for;\n        proxy_set_header X-Forwarded-Proto $scheme;\n\
    \        proxy_set_header Content-Type \"application/json\";\n        proxy_ssl_verify\
    \ off;\n        proxy_read_timeout 120s;\n        proxy_connect_timeout 60s;\n\
    \n        # CORS headers\n        add_header Access-Control-Allow-Origin * always;\n\
    \        add_header Access-Control-Allow-Methods \"GET, POST, OPTIONS\" always;\n\
    \        add_header Access-Control-Allow-Headers \"Content-Type, Authorization\"\
    \ always;\n\n        # Handle OPTIONS preflight\n        if ($request_method =\
    \ 'OPTIONS') {\n            add_header Access-Control-Allow-Origin *;\n      \
    \      add_header Access-Control-Allow-Methods \"GET, POST, OPTIONS\";\n     \
    \       add_header Access-Control-Allow-Headers \"Content-Type, Authorization\"\
    ;\n            add_header Content-Length 0;\n            add_header Content-Type\
    \ text/plain;\n            return 204;\n        }\n    }\n\n    # Proxy MCP tool\
    \ calls directly to MCP server\n    location /mcp/ {\n        proxy_pass https://sunbird-mcp.apps.ocp419.crucible.iisl.com/;\n\
    \        proxy_http_version 1.1;\n        proxy_set_header Host sunbird-mcp.apps.ocp419.crucible.iisl.com;\n\
    \        proxy_set_header Content-Type \"application/json\";\n        proxy_ssl_verify\
    \ off;\n        proxy_read_timeout 120s;\n        proxy_connect_timeout 30s;\n\
    \n        add_header Access-Control-Allow-Origin * always;\n        add_header\
    \ Access-Control-Allow-Methods \"GET, POST, OPTIONS\" always;\n        add_header\
    \ Access-Control-Allow-Headers \"Content-Type\" always;\n\n        if ($request_method\
    \ = 'OPTIONS') {\n            add_header Access-Control-Allow-Origin *;\n    \
    \        add_header Access-Control-Allow-Methods \"GET, POST, OPTIONS\";\n   \
    \         add_header Access-Control-Allow-Headers \"Content-Type\";\n        \
    \    add_header Content-Length 0;\n            return 204;\n        }\n    }\n\
    \n    # Health check\n    location /health {\n        return 200 'OK';\n     \
    \   add_header Content-Type text/plain;\n    }\n}\n"
kind: ConfigMap
metadata:
  name: dctrack-chat-nginx-conf
