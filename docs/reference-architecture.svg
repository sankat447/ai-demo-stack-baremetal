<svg width="100%" viewBox="0 0 680 548" role="img" xmlns="http://www.w3.org/2000/svg">
<title>IIS-AI bare-metal stack reference architecture</title>
<desc>Layered diagram: clients reach an OpenShift router and ingress VIP, which front 14 GitOps-managed apps across four namespaces, running on RHOAI, Service Mesh, Pipelines and GitOps platform operators, backed by ODF/Ceph storage on a compact 3-node OpenShift 4.21 cluster of Dell VxRail E560F servers with no GPU.</desc>
<defs>
<marker id="ah" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#888780"/></marker>
</defs>

<rect x="40" y="16" width="11" height="11" rx="3" class="c-purple"/><text x="55" y="25" class="ts">apps</text>
<rect x="120" y="16" width="11" height="11" rx="3" class="c-teal"/><text x="135" y="25" class="ts">platform</text>
<rect x="215" y="16" width="11" height="11" rx="3" class="c-amber"/><text x="230" y="25" class="ts">storage</text>
<rect x="305" y="16" width="11" height="11" rx="3" class="c-blue"/><text x="320" y="25" class="ts">network</text>
<rect x="395" y="16" width="11" height="11" rx="3" class="c-gray"/><text x="410" y="25" class="ts">hardware</text>

<g class="c-gray"><rect x="210" y="44" width="260" height="34" rx="8"/><text x="340" y="65" text-anchor="middle" class="t">Users · API clients · oc / kubectl</text></g>
<line x1="340" y1="78" x2="340" y2="94" stroke="#888780" stroke-width="1.5" marker-end="url(#ah)"/>

<g class="c-blue"><rect x="40" y="96" width="600" height="48" rx="8"/><text x="52" y="118" class="t">OpenShift router (HAProxy) + ingress VIP 192.168.102.11</text><text x="52" y="135" class="ts">*.apps.ocp419.crucible.iisl.com · edge TLS · self-signed wildcard</text></g>
<line x1="340" y1="144" x2="340" y2="160" stroke="#888780" stroke-width="1.5" marker-end="url(#ah)"/>

<text x="40" y="174" class="ts">Application namespaces — 14 GitOps apps (ArgoCD app-of-apps, waves 1–4)</text>
<g class="c-purple"><rect x="40" y="180" width="138" height="64" rx="8"/><text x="50" y="200" class="t">iis-ai-ui</text><text x="50" y="217" class="ts">open-webui · n8n</text><text x="50" y="232" class="ts">grafana · cloudbeaver</text></g>
<g class="c-purple"><rect x="194" y="180" width="138" height="64" rx="8"/><text x="204" y="200" class="t">iis-ai-ai</text><text x="204" y="217" class="ts">portkey (gateway)</text><text x="204" y="232" class="ts">langchain (LangGraph)</text></g>
<g class="c-purple"><rect x="348" y="180" width="138" height="64" rx="8"/><text x="358" y="200" class="t">iis-ai-system</text><text x="358" y="217" class="ts">vault · keycloak</text><text x="358" y="232" class="ts">mlflow</text></g>
<g class="c-purple"><rect x="502" y="180" width="138" height="64" rx="8"/><text x="512" y="200" class="t">iis-ai-data</text><text x="512" y="217" class="ts">postgres + pgvector</text><text x="512" y="232" class="ts">mongo · redis · minio</text></g>

<text x="40" y="268" class="ts">Platform operators</text>
<g class="c-teal"><rect x="40" y="274" width="138" height="54" rx="8"/><text x="50" y="294" class="t">RHOAI / KServe</text><text x="50" y="311" class="ts">serving — CPU only</text></g>
<g class="c-teal"><rect x="194" y="274" width="138" height="54" rx="8"/><text x="204" y="294" class="t">Service Mesh</text><text x="204" y="311" class="ts">Istio (optional)</text></g>
<g class="c-teal"><rect x="348" y="274" width="138" height="54" rx="8"/><text x="358" y="294" class="t">Pipelines</text><text x="358" y="311" class="ts">Tekton</text></g>
<g class="c-teal"><rect x="502" y="274" width="138" height="54" rx="8"/><text x="512" y="294" class="t">GitOps</text><text x="512" y="311" class="ts">ArgoCD app-of-apps</text></g>

<text x="40" y="352" class="ts">Storage</text>
<g class="c-amber"><rect x="40" y="358" width="600" height="48" rx="8"/><text x="52" y="380" class="t">ODF / Ceph (Rook) — 2× 1.6 TB SAS SSD per node</text><text x="52" y="397" class="ts">ceph-rbd RWO (default) · cephfs RWX · rgw + noobaa S3 · MinIO in-stack</text></g>

<text x="40" y="430" class="ts">Bare metal — compact 3-node OpenShift 4.21.6 (each node control-plane + worker)</text>
<g class="c-gray"><rect x="40" y="436" width="186" height="56" rx="8"/><text x="50" y="456" class="t">master-0 · .102.5</text><text x="50" y="473" class="ts">Xeon Gold 6242R 20C/40T</text><text x="50" y="487" class="ts">187 GiB RAM · no GPU</text></g>
<g class="c-gray"><rect x="247" y="436" width="186" height="56" rx="8"/><text x="257" y="456" class="t">master-1 · .102.6</text><text x="257" y="473" class="ts">Xeon Gold 6242R 20C/40T</text><text x="257" y="487" class="ts">187 GiB RAM · no GPU</text></g>
<g class="c-gray"><rect x="454" y="436" width="186" height="56" rx="8"/><text x="464" y="456" class="t">master-2 · .102.7</text><text x="464" y="473" class="ts">Xeon Gold 6242R 20C/40T</text><text x="464" y="487" class="ts">187 GiB RAM · no GPU</text></g>

<text x="40" y="516" class="ts">OVN-Kubernetes · pods 10.128.0.0/14 · svc 172.30.0.0/16 · bond0 active-backup 10G · direct egress (no air-gap)</text>
<text x="40" y="532" class="ts">Out of stack: iis-ai-dcim (DCIM/Sunbird demo) is deployed separately from the iis-dcim repo.</text>
</svg>
