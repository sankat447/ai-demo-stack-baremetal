# vLLM ServingRuntime — PARKED (see README.md). CPU-adapted from the AWS T4 GPU
# version: GPU removed, RawDeployment-compatible. ⚠️ The image below is CUDA and
# WILL NOT run on CPU — substitute a CPU-capable vLLM build (or swap to Ollama)
# before serving. Not synced by the App-of-Apps.
apiVersion: serving.kserve.io/v1alpha1
kind: ServingRuntime
metadata:
  name: vllm-runtime
  namespace: iis-ai-ai
  labels:
    opendatahub.io/dashboard: "true"
  annotations:
    openshift.io/display-name: "vLLM Runtime (CPU — needs CPU image / GPU node)"
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
spec:
  annotations:
    prometheus.io/port: "8080"
    prometheus.io/path: "/metrics"
  multiModel: false
  supportedModelFormats:
  - name: pytorch
    version: "1"
    autoSelect: true
  - name: vllm
    version: "1"
    autoSelect: true
  containers:
  - name: kserve-container
    image: quay.io/modh/vllm:rhoai-2.16   # TODO: replace with a CPU-capable image
    command: ["python", "-m", "vllm.entrypoints.openai.api_server"]
    args:
    - "--port=8080"
    - "--model=/mnt/models"
    - "--served-model-name={{.Name}}"
    - "--dtype=float32"          # CPU: no float16
    - "--max-model-len=2048"
    - "--device=cpu"             # CPU inference (requires CPU vLLM build)
    - "--enforce-eager"
    ports:
    - containerPort: 8080
      protocol: TCP
    env:
    - name: HF_HOME
      value: /tmp/hf_home
    - name: TRANSFORMERS_CACHE
      value: /tmp/hf_home
    resources:
      requests:
        cpu: "4"
        memory: "16Gi"
      limits:
        cpu: "8"
        memory: "24Gi"
    volumeMounts:
    - name: shm
      mountPath: /dev/shm
  volumes:
  - name: shm
    emptyDir:
      medium: Memory
      sizeLimit: 2Gi
