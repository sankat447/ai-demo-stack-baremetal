# LangServe / LangGraph server — ported: namespace langchain → iis-ai-ai.
# API-only (use /docs for Swagger — lesson #11). Mesh member.
# Cross-refs rewired: portkey → iis-ai-ai; Aurora RDS → in-cluster Postgres
# (iis-ai-postgres-primary.iis-ai-data); AWS S3 → MinIO (iis-ai-data).
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: langchain-server
  namespace: iis-ai-ai
  labels:
    app: langchain-server
spec:
  replicas: 1
  selector:
    matchLabels:
      app: langchain-server
  template:
    metadata:
      labels:
        app: langchain-server
        maistra.io/expose-route: "true"
    spec:
      containers:
      - name: langchain-server
        image: langchain/langserve:latest
        ports:
        - containerPort: 8000
        env:
        - name: PORTKEY_GATEWAY_URL
          value: "http://portkey.iis-ai-ai.svc:8787"
        - name: POSTGRES_URI
          value: "postgresql://rhoai_admin:Demo1234%23@iis-ai-postgres-primary.iis-ai-data.svc:5432/rhoai_demo"
        - name: PGVECTOR_CONNECTION_STRING
          value: "postgresql://rhoai_admin:Demo1234%23@iis-ai-postgres-primary.iis-ai-data.svc:5432/rhoai_demo"
        # S3 → MinIO (in-cluster). region kept only because some S3 SDKs require one.
        - name: AWS_DEFAULT_REGION
          value: "us-east-1"
        - name: S3_ENDPOINT_URL
          value: "http://minio.iis-ai-data.svc:9000"
        - name: AWS_ACCESS_KEY_ID
          value: "minioadmin"
        - name: AWS_SECRET_ACCESS_KEY
          value: "Demo1234#"
        - name: S3_BUCKET
          value: "notebook-data"
        readinessProbe:
          tcpSocket:
            port: 8000
          initialDelaySeconds: 15
          periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: langchain-server
  namespace: iis-ai-ai
spec:
  selector:
    app: langchain-server
  ports:
  - port: 8000
    targetPort: 8000
---
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: langchain-server
  namespace: iis-ai-ai
spec:
  to:
    kind: Service
    name: langchain-server
  port:
    targetPort: 8000
  tls:
    termination: edge
    insecureEdgeTerminationPolicy: Redirect
