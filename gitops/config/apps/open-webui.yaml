# Open WebUI — ported: namespace ai-demo → iis-ai-ui. Mesh member.
# Cross-refs rewired: portkey → iis-ai-ai, mongodb → iis-ai-data.
# RWX storage efs-sc → ocs-storagecluster-cephfs (Open WebUI needs RWX).
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: open-webui
  namespace: iis-ai-ui
  labels:
    app: open-webui
spec:
  replicas: 1
  selector:
    matchLabels:
      app: open-webui
  template:
    metadata:
      labels:
        app: open-webui
        maistra.io/expose-route: "true"
    spec:
      containers:
      - name: open-webui
        image: ghcr.io/open-webui/open-webui:main
        ports:
        - containerPort: 8080
        env:
        - name: WEBUI_SECRET_KEY
          value: "Demo1234#"
        - name: OPENAI_API_BASE_URL
          value: "http://portkey.iis-ai-ai.svc:8787/v1"
        - name: OPENAI_API_KEY
          value: "demo-key"
        - name: MONGODB_URI
          value: "mongodb://root:Demo1234#@mongodb.iis-ai-data.svc:27017"
        - name: DEFAULT_MODELS
          value: "llama-3.1-8b"
        volumeMounts:
        - name: data
          mountPath: /app/backend/data
        readinessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 15
          periodSeconds: 10
      volumes:
      - name: data
        persistentVolumeClaim:
          claimName: open-webui-data
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: open-webui-data
  namespace: iis-ai-ui
spec:
  accessModes: [ReadWriteMany]
  storageClassName: ocs-storagecluster-cephfs
  resources:
    requests:
      storage: 10Gi
---
apiVersion: v1
kind: Service
metadata:
  name: open-webui
  namespace: iis-ai-ui
spec:
  selector:
    app: open-webui
  ports:
  - port: 8080
    targetPort: 8080
---
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: open-webui
  namespace: iis-ai-ui
spec:
  to:
    kind: Service
    name: open-webui
  port:
    targetPort: 8080
  tls:
    termination: edge
    insecureEdgeTerminationPolicy: Redirect
