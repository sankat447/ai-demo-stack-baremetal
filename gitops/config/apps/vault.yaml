# HashiCorp Vault (dev mode) — ported: namespace vault → iis-ai-system,
# gp3-csi → ocs-storagecluster-ceph-rbd. Keeps its ServiceAccount (lesson #12).
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: vault
  namespace: iis-ai-system
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: vault
  namespace: iis-ai-system
  labels:
    app: vault
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: vault
  template:
    metadata:
      labels:
        app: vault
    spec:
      serviceAccountName: vault
      containers:
      - name: vault
        image: docker.io/hashicorp/vault:1.13.3
        ports:
        - containerPort: 8200
        env:
        - name: VAULT_DEV_ROOT_TOKEN_ID
          value: "Demo1234#"
        - name: VAULT_DEV_LISTEN_ADDRESS
          value: "0.0.0.0:8200"
        - name: VAULT_ADDR
          value: "http://127.0.0.1:8200"
        - name: SKIP_SETCAP
          value: "true"
        - name: HOME
          value: "/tmp"
        args: ["server", "-dev", "-dev-no-store-token"]
        volumeMounts:
        - name: data
          mountPath: /vault/data
        readinessProbe:
          httpGet:
            path: /v1/sys/health
            port: 8200
          initialDelaySeconds: 5
          periodSeconds: 10
      volumes:
      - name: data
        persistentVolumeClaim:
          claimName: vault-data
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: vault-data
  namespace: iis-ai-system
spec:
  accessModes: [ReadWriteOnce]
  storageClassName: ocs-storagecluster-ceph-rbd
  resources:
    requests:
      storage: 10Gi
---
apiVersion: v1
kind: Service
metadata:
  name: vault
  namespace: iis-ai-system
spec:
  selector:
    app: vault
  ports:
  - port: 8200
    targetPort: 8200
---
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: vault
  namespace: iis-ai-system
spec:
  to:
    kind: Service
    name: vault
  port:
    targetPort: 8200
  tls:
    termination: edge
    insecureEdgeTerminationPolicy: Redirect
