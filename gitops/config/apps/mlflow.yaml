# MLflow — ported: namespace rhoai-mlflow → iis-ai-system.
# S3 artifacts → MinIO (iis-ai-data), bucket "mlflow-artifacts" (created by the
# minio-bucket-init hook). Backend store is sqlite on the pod (ephemeral, as in
# the AWS build) — point at Postgres for durable tracking if needed.
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mlflow
  namespace: iis-ai-system
  labels:
    app: mlflow
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mlflow
  template:
    metadata:
      labels:
        app: mlflow
    spec:
      containers:
      - name: mlflow
        image: ghcr.io/mlflow/mlflow:v2.12.1
        ports:
        - containerPort: 5000
        command: ["/bin/sh", "-c"]
        args:
        - "pip install --target=/tmp/pip psycopg2-binary boto3 && export PYTHONPATH=/tmp/pip:$PYTHONPATH && mlflow server --host=0.0.0.0 --port=5000 --backend-store-uri=sqlite:///tmp/mlflow.db --default-artifact-root=s3://mlflow-artifacts/"
        env:
        - name: AWS_DEFAULT_REGION
          value: "us-east-1"
        - name: MLFLOW_S3_ENDPOINT_URL
          value: "http://minio.iis-ai-data.svc:9000"
        - name: AWS_ACCESS_KEY_ID
          value: "minioadmin"
        - name: AWS_SECRET_ACCESS_KEY
          value: "Demo1234#"
        readinessProbe:
          httpGet:
            path: /health
            port: 5000
          initialDelaySeconds: 15
          periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: mlflow
  namespace: iis-ai-system
spec:
  selector:
    app: mlflow
  ports:
  - port: 5000
    targetPort: 5000
---
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: mlflow
  namespace: iis-ai-system
spec:
  to:
    kind: Service
    name: mlflow
  port:
    targetPort: 5000
  tls:
    termination: edge
    insecureEdgeTerminationPolicy: Redirect
