# n8n — ported: namespace ai-demo → iis-ai-ui. Mesh member.
# Changed from the AWS version (which used sqlite) to a POSTGRES backend, to
# match the live cluster and the migrated workflows (see migration/n8n/).
# DB: iis-ai-postgres-primary.iis-ai-data, database "n8n" (created by
# postgres.yaml's init hook). RWX data on cephfs.
# Keeps SA + anyuid binding (runs as UID 1000 — lesson #12).
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: n8n
  namespace: iis-ai-ui
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: n8n-anyuid
  namespace: iis-ai-ui
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: system:openshift:scc:anyuid
subjects:
  - kind: ServiceAccount
    name: n8n
    namespace: iis-ai-ui
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: n8n
  namespace: iis-ai-ui
  labels:
    app: n8n
spec:
  replicas: 1
  selector:
    matchLabels:
      app: n8n
  template:
    metadata:
      labels:
        app: n8n
        maistra.io/expose-route: "true"
    spec:
      serviceAccountName: n8n
      securityContext:
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
      initContainers:
      - name: fix-permissions
        image: docker.io/busybox:latest
        command: ["sh", "-c", "chown -R 1000:1000 /home/node/.n8n"]
        securityContext:
          runAsUser: 0
        volumeMounts:
        - name: data
          mountPath: /home/node/.n8n
      containers:
      - name: n8n
        image: docker.io/n8nio/n8n:latest
        ports:
        - containerPort: 5678
        env:
        - name: HOME
          value: "/home/node"
        - name: N8N_BASIC_AUTH_ACTIVE
          value: "true"
        - name: N8N_BASIC_AUTH_USER
          value: "admin"
        - name: N8N_BASIC_AUTH_PASSWORD
          value: "Demo1234#"
        - name: N8N_PROTOCOL
          value: "https"
        - name: N8N_PORT
          value: "5678"
        - name: GENERIC_TIMEZONE
          value: "America/New_York"
        - name: N8N_USER_FOLDER
          value: "/home/node"
        # Postgres backend (matches migrated workflows)
        - name: DB_TYPE
          value: "postgresdb"
        - name: DB_POSTGRESDB_HOST
          value: "iis-ai-postgres-primary.iis-ai-data.svc"
        - name: DB_POSTGRESDB_PORT
          value: "5432"
        - name: DB_POSTGRESDB_DATABASE
          value: "n8n"
        - name: DB_POSTGRESDB_USER
          value: "rhoai_admin"
        - name: DB_POSTGRESDB_PASSWORD
          value: "Demo1234#"
        volumeMounts:
        - name: data
          mountPath: /home/node/.n8n
        readinessProbe:
          httpGet:
            path: /healthz
            port: 5678
          initialDelaySeconds: 15
          periodSeconds: 10
      volumes:
      - name: data
        persistentVolumeClaim:
          claimName: n8n-data
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: n8n-data
  namespace: iis-ai-ui
spec:
  accessModes: [ReadWriteMany]
  storageClassName: ocs-storagecluster-cephfs
  resources:
    requests:
      storage: 5Gi
---
apiVersion: v1
kind: Service
metadata:
  name: n8n
  namespace: iis-ai-ui
spec:
  selector:
    app: n8n
  ports:
  - port: 5678
    targetPort: 5678
---
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: n8n
  namespace: iis-ai-ui
spec:
  to:
    kind: Service
    name: n8n
  port:
    targetPort: 5678
  tls:
    termination: edge
    insecureEdgeTerminationPolicy: Redirect
