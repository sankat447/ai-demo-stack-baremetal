# RHOAI DataScienceCluster — enables the components we actually use.
# Apply AFTER the rhods-operator CSV is Succeeded and the DSCInitialization is up.
# KServe set to Serverless or RawDeployment; RawDeployment avoids the Knative/
# mesh dependency chain and is simpler on a compact CPU-only cluster.
apiVersion: datasciencecluster.opendatahub.io/v1
kind: DataScienceCluster
metadata:
  name: default-dsc
spec:
  components:
    kserve:
      managementState: Managed
      defaultDeploymentMode: RawDeployment
      serving:
        managementState: Removed     # no Knative Serverless; RawDeployment instead
    modelmeshserving:
      managementState: Removed
    dashboard:
      managementState: Managed
    workbenches:
      managementState: Managed
    datasciencepipelines:
      managementState: Managed
    ray:
      managementState: Removed
    kueue:
      managementState: Removed
    trainingoperator:
      managementState: Removed
    codeflare:
      managementState: Removed
