# Red Hat OpenShift Service Mesh (Istio) operator. The mesh control plane
# (SMCP) + member rolls are defined per-app in gitops/config (the stack runs
# STRICT mTLS — see lesson #4: mesh-member routes need maistra.io/expose-route).
apiVersion: operators.coreos.com/v1alpha1
kind: Subscription
metadata:
  name: servicemeshoperator
  namespace: openshift-operators
spec:
  channel: stable
  installPlanApproval: Automatic
  name: servicemeshoperator
  source: redhat-operators
  sourceNamespace: openshift-marketplace
