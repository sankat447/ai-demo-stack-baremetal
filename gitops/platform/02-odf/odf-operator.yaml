# OpenShift Data Foundation operator (Internal mode / Rook-Ceph).
# Replaces AWS EBS+EFS+S3: gives RWO block, RWX CephFS, and S3 (RGW) in-cluster.
# Live cluster ran stable-4.16; retargeted to stable-4.21 to match OCP 4.21.
apiVersion: v1
kind: Namespace
metadata:
  name: openshift-storage
  labels:
    openshift.io/cluster-monitoring: "true"
---
apiVersion: operators.coreos.com/v1
kind: OperatorGroup
metadata:
  name: openshift-storage-operatorgroup
  namespace: openshift-storage
spec:
  targetNamespaces:
  - openshift-storage
---
apiVersion: operators.coreos.com/v1alpha1
kind: Subscription
metadata:
  name: odf-operator
  namespace: openshift-storage
spec:
  channel: stable-4.21
  installPlanApproval: Automatic
  name: odf-operator
  source: redhat-operators
  sourceNamespace: openshift-marketplace
